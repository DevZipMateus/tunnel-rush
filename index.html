<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Tunnel Rush</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; background:#000; overflow:hidden; font-family:'Courier New',monospace; touch-action:none; }
  canvas { display:block; }

  .overlay {
    display:none; position:fixed; inset:0;
    background:rgba(0,0,0,0.85);
    flex-direction:column; align-items:center; justify-content:center;
    gap:14px; z-index:10; padding:20px; text-align:center;
  }
  .overlay.show { display:flex; }
  .ov-title {
    font-size:clamp(2rem,8vw,3.5rem); font-weight:900;
    letter-spacing:0.12em; line-height:1.1;
    text-shadow:0 0 20px currentColor, 0 0 60px currentColor;
  }
  .ov-sub { font-size:clamp(0.75rem,2.5vw,0.95rem); color:rgba(255,255,255,0.5); letter-spacing:0.06em; max-width:360px; }
  .ov-score { font-size:clamp(1rem,3.5vw,1.5rem); color:#fff; letter-spacing:0.08em; }
  .ov-best  { font-size:clamp(0.7rem,2.2vw,0.85rem); color:rgba(255,255,255,0.38); }
  .ov-btn {
    padding:12px 36px; border:2px solid currentColor; background:transparent;
    color:inherit; font-family:'Courier New',monospace; font-size:clamp(0.8rem,2.5vw,1rem);
    font-weight:bold; letter-spacing:0.14em; cursor:pointer; border-radius:4px;
    text-shadow:0 0 8px currentColor; box-shadow:0 0 12px currentColor;
    transition:background .18s;
  }
  .ov-btn:hover { background:rgba(255,255,255,0.10); }
  .ov-btn-sm { padding:7px 18px; font-size:clamp(0.62rem,1.8vw,0.75rem); opacity:0.65; }
  .auth-form { display:flex; flex-direction:column; gap:8px; width:100%; max-width:280px; }
  .auth-form input {
    padding:10px 14px; background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.18); border-radius:4px;
    color:#fff; font-family:'Courier New',monospace; font-size:0.85rem; outline:none;
  }
  .auth-form input:focus { border-color:rgba(255,255,255,0.45); }
  .auth-msg { font-size:0.72rem; min-height:16px; }
  .rank-table { width:100%; max-width:320px; border-collapse:collapse; font-size:clamp(0.62rem,1.9vw,0.78rem); }
  .rank-table td { padding:5px 7px; }
  .rank-pos  { color:rgba(255,255,255,0.4); width:28px; text-align:center; }
  .rank-name { color:rgba(255,255,255,0.8); }
  .rank-sc   { color:#fff; font-weight:bold; text-align:right; }
  .rank-me td { color:#fff !important; }
  #hud {
    position:fixed; top:0; left:0; right:0;
    display:flex; justify-content:space-between; align-items:flex-start;
    padding:10px 16px; pointer-events:none; z-index:5;
  }
  #hudScore { font-size:clamp(1.1rem,3.5vw,1.6rem); font-weight:bold; letter-spacing:0.08em; text-shadow:0 0 10px currentColor; }
  #hudPhase { font-size:clamp(0.58rem,1.8vw,0.72rem); color:rgba(255,255,255,0.38); letter-spacing:0.12em; margin-top:2px; }
  #hudBest  { font-size:clamp(0.58rem,1.8vw,0.7rem);  color:rgba(255,255,255,0.28); letter-spacing:0.06em; text-align:right; }
  #ctrlHint { position:fixed; bottom:14px; left:50%; transform:translateX(-50%); font-size:clamp(0.55rem,1.6vw,0.68rem); color:rgba(255,255,255,0.22); letter-spacing:0.1em; pointer-events:none; z-index:5; }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="hud" style="display:none">
  <div>
    <div id="hudScore" style="color:#00ffff">0</div>
    <div id="hudPhase">FASE 1 — NEXUS</div>
  </div>
  <div id="hudBest"></div>
</div>
<div id="ctrlHint">◀ A / ← &nbsp;&nbsp; D / → ▶ &nbsp;|&nbsp; ARRASTE</div>

<!-- Start -->
<div class="overlay show" id="ovStart">
  <div class="ov-title" style="color:#00ffff">TUNNEL<br>RUSH</div>
  <div class="ov-sub">Sobreviva no túnel infinito. O túnel gira — você fica na base.</div>
  <div id="ovBestRow" style="display:none"><div class="ov-best" id="ovBestTxt"></div></div>
  <button class="ov-btn" style="color:#00ffff" onclick="startGame()">▶ JOGAR</button>
  <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:2px">
    <button class="ov-btn ov-btn-sm" style="color:#ff44aa" onclick="showOv('ovAuth')">🔑 ENTRAR</button>
    <button class="ov-btn ov-btn-sm" style="color:#ffd700" onclick="showRanking()">🏆 RANKING</button>
  </div>
  <div id="userBadge" style="display:none;margin-top:6px;font-size:0.72rem;color:rgba(0,255,255,0.55)">
    👤 <span id="badgeUser">—</span>
    &nbsp;<button onclick="doSignOut()" style="background:none;border:none;color:rgba(255,80,80,0.6);cursor:pointer;font-family:'Courier New',monospace;font-size:0.62rem">Sair</button>
  </div>
</div>

<!-- Game Over -->
<div class="overlay" id="ovGameOver">
  <div class="ov-title" style="color:#ff2244">GAME<br>OVER</div>
  <div class="ov-score">Score: <span id="goScore">0</span></div>
  <div class="ov-best" id="goBest"></div>
  <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:8px">
    <button class="ov-btn" style="color:#00ffff" onclick="startGame()">↺ TENTAR NOVAMENTE</button>
    <button class="ov-btn ov-btn-sm" style="color:#ffd700" onclick="showRanking()">🏆 RANKING</button>
  </div>
  <div id="goSaveMsg" style="font-size:0.68rem;color:rgba(255,255,255,0.3);margin-top:4px"></div>
</div>

<!-- Auth -->
<div class="overlay" id="ovAuth">
  <div class="ov-title" style="font-size:1.7rem;color:#ff44aa">AUTH</div>
  <div style="display:flex;border:1px solid rgba(255,255,255,0.14);border-radius:4px;overflow:hidden;margin-bottom:2px">
    <button id="tabLogin"  onclick="switchTab('login')"  style="flex:1;padding:8px;background:rgba(255,68,170,0.18);border:none;color:#fff;cursor:pointer;font-family:'Courier New',monospace;font-size:0.75rem;letter-spacing:0.06em">ENTRAR</button>
    <button id="tabSignup" onclick="switchTab('signup')" style="flex:1;padding:8px;background:transparent;border:none;color:rgba(255,255,255,0.38);cursor:pointer;font-family:'Courier New',monospace;font-size:0.75rem;letter-spacing:0.06em">CADASTRAR</button>
  </div>
  <div id="formLogin" class="auth-form">
    <input type="email"    id="loginEmail" placeholder="E-mail"   autocomplete="email">
    <input type="password" id="loginPass"  placeholder="Senha"    autocomplete="current-password">
    <button class="ov-btn" style="color:#ff44aa" onclick="doLogin()">ENTRAR</button>
    <div class="auth-msg" id="loginMsg" style="color:#ff6688"></div>
  </div>
  <div id="formSignup" class="auth-form" style="display:none">
    <input type="text"     id="signupUser"  placeholder="Nome de usuário" autocomplete="username">
    <input type="email"    id="signupEmail" placeholder="E-mail"          autocomplete="email">
    <input type="password" id="signupPass"  placeholder="Senha (6+)"      autocomplete="new-password">
    <button class="ov-btn" style="color:#00ff88" onclick="doSignup()">CRIAR CONTA</button>
    <div class="auth-msg" id="signupMsg" style="color:#44ff88"></div>
  </div>
  <button class="ov-btn ov-btn-sm" style="color:rgba(255,255,255,0.3);margin-top:4px" onclick="showOv('ovStart')">← VOLTAR</button>
</div>

<!-- Ranking -->
<div class="overlay" id="ovRanking">
  <div class="ov-title" style="font-size:1.7rem;color:#ffd700">🏆 RANKING</div>
  <div id="rankList" style="width:100%;max-width:320px;min-height:60px;display:flex;align-items:center;justify-content:center">
    <div class="ov-sub">Carregando...</div>
  </div>
  <button class="ov-btn ov-btn-sm" style="color:rgba(255,255,255,0.3);margin-top:6px" onclick="showOv('ovStart')">← VOLTAR</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ═══════════════════════════════════════════════════════════════
//  TUNNEL RUSH  v2.0  —  Nave fixa na base, túnel gira
// ═══════════════════════════════════════════════════════════════

const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');

let W, H, CX, CY;
function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  CX = W / 2; CY = H / 2;
}
window.addEventListener('resize', resize);
resize();

// ── Fases ────────────────────────────────────────────────────────
const PHASES = [
  { name:'NEXUS',   col:'#00ffff', col2:'#0055ff', wall:'#001833' },
  { name:'INFERNO', col:'#ff3300', col2:'#ff9900', wall:'#1a0500' },
  { name:'ACID',    col:'#aaff00', col2:'#00ff44', wall:'#061a00' },
  { name:'VORTEX',  col:'#cc00ff', col2:'#ff00aa', wall:'#120020' },
  { name:'SOLAR',   col:'#ffd700', col2:'#ff6600', wall:'#1a1000' },
  { name:'FREEZE',  col:'#88eeff', col2:'#aaaaff', wall:'#000d1a' },
];

// ── Constantes ───────────────────────────────────────────────────
const FOV      = 380;
const ZNEAR    = 55;
const ZFAR     = 1600;
const RING_GAP = 100;
const BASE_SPD = 300;
const PHASE_DUR = 30;
// Raio do túnel na tela em relação ao menor lado
const T_RAD_RATIO = 0.43;
// O jogador fica na borda INFERIOR do túnel visível
const PLAYER_ANGLE_DEFAULT = Math.PI / 2; // baixo (90°)

// ── Estado ───────────────────────────────────────────────────────
let state = 'idle';
let score, bestScore, totalTime, speed, phaseIdx, phaseTimer;
let tunnelAngle = 0;   // ângulo de rotação do túnel (o jogador fica parado)
let obstacles = [], particles = [], floatMsgs = [];
let deathFlash = 0, playerDead = false;
let shipTilt = 0;      // inclinação visual da nave
let enginePulse = 0;

// ── Supabase ─────────────────────────────────────────────────────
const SUPA_URL = 'https://tzxdkkoajxwgkphzixyr.supabase.co';
const SUPA_KEY = 'sb_publishable_7T9duH_ZzV7eOywjYPekTg_zLOk9bDx';
const supa = window.supabase.createClient(SUPA_URL, SUPA_KEY);
let supaUser = null, supaProfile = null;

// ── Input ────────────────────────────────────────────────────────
let keyLeft = false, keyRight = false;
let touchDX = 0, lastTouchX = 0, isTouching = false;

window.addEventListener('keydown', e => {
  if (e.key==='ArrowLeft' ||e.key==='a'||e.key==='A') keyLeft  = true;
  if (e.key==='ArrowRight'||e.key==='d'||e.key==='D') keyRight = true;
  if ((e.key===' '||e.key==='Enter') && state!=='playing') startGame();
});
window.addEventListener('keyup', e => {
  if (e.key==='ArrowLeft' ||e.key==='a'||e.key==='A') keyLeft  = false;
  if (e.key==='ArrowRight'||e.key==='d'||e.key==='D') keyRight = false;
});
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (state!=='playing') { startGame(); return; }
  lastTouchX = e.touches[0].clientX;
  isTouching = true; touchDX = 0;
}, {passive:false});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!isTouching) return;
  touchDX = e.touches[0].clientX - lastTouchX;
  lastTouchX = e.touches[0].clientX;
}, {passive:false});
canvas.addEventListener('touchend', e => {
  e.preventDefault();
  isTouching = false; touchDX = 0;
}, {passive:false});
canvas.addEventListener('click', () => { if (state!=='playing') startGame(); });

// ── Overlays ─────────────────────────────────────────────────────
function showOv(id) { document.querySelectorAll('.overlay').forEach(o=>o.classList.remove('show')); document.getElementById(id).classList.add('show'); }
function hideOvs()  { document.querySelectorAll('.overlay').forEach(o=>o.classList.remove('show')); }

// ── Partículas ───────────────────────────────────────────────────
class Particle {
  constructor(x,y,vx,vy,col,life,r) { this.x=x;this.y=y;this.vx=vx;this.vy=vy;this.col=col;this.life=life;this.maxLife=life;this.r=r; }
  update(dt) { this.x+=this.vx*dt; this.y+=this.vy*dt; this.vy+=55*dt; this.life-=dt; }
  draw() {
    const a=Math.max(0,this.life/this.maxLife);
    ctx.save(); ctx.globalAlpha=a; ctx.fillStyle=this.col; ctx.shadowColor=this.col; ctx.shadowBlur=8;
    ctx.beginPath(); ctx.arc(this.x,this.y,this.r*a,0,Math.PI*2); ctx.fill(); ctx.restore();
  }
}
function spawnBurst(x,y,col,n=24) {
  for(let i=0;i<n;i++) {
    const a=Math.random()*Math.PI*2, sp=80+Math.random()*280;
    particles.push(new Particle(x,y,Math.cos(a)*sp,Math.sin(a)*sp,col,0.5+Math.random()*0.8,2+Math.random()*5));
  }
}
function spawnTrail(x,y,col) {
  particles.push(new Particle(x,y,(Math.random()-.5)*20,(Math.random()-.5)*20+12,col,0.10+Math.random()*0.10,1+Math.random()*2.5));
}

// ── Float messages ───────────────────────────────────────────────
function addFloat(txt, col) {
  floatMsgs.push({ txt, col, y: CY*0.28, alpha:1.2, vy:-38 });
}

// ── Obstáculos ───────────────────────────────────────────────────
// Tipos: 0=barra dupla com gap, 1=triângulos espinhos, 2=quadrado 3D, 3=anel com gap
class Obstacle {
  constructor(z) {
    this.z   = z;
    const TYPES = [0, 1, 3];
    this.type = TYPES[Math.floor(Math.random() * TYPES.length)];
    this.rot  = Math.random() * Math.PI * 2;
    this.rotSpd = (Math.random() - 0.5) * 1.6;
    // gap para tipos com buraco
    this.gapAngle = Math.random() * Math.PI * 2;
    this.gapSize  = Math.PI * (0.30 + Math.random() * 0.22);  // largura do gap
    this.dead = false;
  }
  update(dt, spd) {
    this.z   -= spd * dt;
    this.rot += this.rotSpd * dt;
    if (this.z < -ZNEAR * 3) this.dead = true;
  }
  draw(col, col2) {
    if (this.z <= 1) return;
    const sc = FOV / this.z;
    const r  = Math.min(W, H) * T_RAD_RATIO * sc;
    if (r < 3 || r > Math.max(W,H) * 3) return;
    const alpha = Math.min(1, (this.z - ZNEAR) / (ZNEAR * 1.8)) * 0.96;
    if (alpha <= 0) return;
    const lw = Math.max(2, 5 * sc);

    ctx.save();
    ctx.translate(CX, CY);
    ctx.rotate(this.rot);
    ctx.globalAlpha = alpha;
    ctx.strokeStyle = col; ctx.fillStyle = col;
    ctx.shadowColor = col; ctx.shadowBlur = 18 + 10 * sc;
    ctx.lineWidth   = lw;

    switch(this.type) {
      case 0: { // Barras duplas horizontais com gap no centro
        const barH = r * 0.18;
        const gap  = r * 0.30; // espaço no meio
        // Barra da esquerda
        ctx.beginPath();
        ctx.rect(-r, -barH/2, r - gap, barH);
        ctx.fill();
        // Barra da direita
        ctx.beginPath();
        ctx.rect(gap, -barH/2, r - gap, barH);
        ctx.fill();
        // Efeito 3D: face superior mais clara
        ctx.globalAlpha = alpha * 0.45;
        ctx.fillStyle = col2;
        ctx.fillRect(-r, -barH/2 - barH*0.35, r-gap, barH*0.35);
        ctx.fillRect(gap, -barH/2 - barH*0.35, r-gap, barH*0.35);
        // Bordas neon
        ctx.globalAlpha = alpha * 0.8;
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(-r, -barH/2, r-gap, 2);
        ctx.fillRect(gap, -barH/2, r-gap, 2);
        break;
      }
      case 1: { // Triângulos espinhos (4 lados, como original)
        const nSpikes = 4;
        const spikeLen = r * 0.55;
        const spikeW   = r * 0.14;
        ctx.lineWidth = 1.5;
        for (let i = 0; i < nSpikes; i++) {
          ctx.save();
          ctx.rotate(i * Math.PI * 2 / nSpikes);
          // Triângulo apontando para o centro
          const tip  = spikeLen;
          const base = r;
          ctx.beginPath();
          ctx.moveTo(-spikeW, base);
          ctx.lineTo(spikeW, base);
          ctx.lineTo(0, base - tip);
          ctx.closePath();
          ctx.fill();
          // Brilho na borda
          ctx.strokeStyle = col2; ctx.shadowColor = col2;
          ctx.stroke();
          // Face interna mais clara
          ctx.globalAlpha = alpha * 0.50;
          ctx.fillStyle = col2;
          ctx.beginPath();
          ctx.moveTo(0, base);
          ctx.lineTo(spikeW * 0.4, base);
          ctx.lineTo(0, base - tip * 0.6);
          ctx.closePath();
          ctx.fill();
          ctx.restore();
        }
        break;
      }
      case 2: { // Quadrado 3D no centro com gap nos cantos
        const sq = r * 0.52;
        const depth = sq * 0.28;
        // Frente do cubo
        ctx.beginPath();
        ctx.rect(-sq/2, -sq/2, sq, sq);
        ctx.fill();
        ctx.strokeStyle = col2; ctx.lineWidth = lw * 0.6; ctx.stroke();
        // Face superior (3D)
        ctx.globalAlpha = alpha * 0.55;
        ctx.fillStyle = col2;
        ctx.beginPath();
        ctx.moveTo(-sq/2, -sq/2);
        ctx.lineTo(-sq/2 + depth, -sq/2 - depth);
        ctx.lineTo(sq/2  + depth, -sq/2 - depth);
        ctx.lineTo(sq/2,  -sq/2);
        ctx.closePath(); ctx.fill();
        // Face direita (3D)
        ctx.beginPath();
        ctx.moveTo(sq/2, -sq/2);
        ctx.lineTo(sq/2 + depth, -sq/2 - depth);
        ctx.lineTo(sq/2 + depth,  sq/2 - depth);
        ctx.lineTo(sq/2,  sq/2);
        ctx.closePath(); ctx.fill();
        // Borda frontal brilhante
        ctx.globalAlpha = alpha;
        ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 1.5;
        ctx.strokeRect(-sq/2, -sq/2, sq, sq);
        break;
      }
      case 3: { // Anel com gap (o mais clássico)
        const gS = this.gapAngle - this.gapSize / 2;
        const gE = this.gapAngle + this.gapSize / 2;
        ctx.lineWidth = lw * 1.3;
        ctx.beginPath();
        ctx.arc(0, 0, r * 0.82, gE, gS + Math.PI * 2);
        ctx.stroke();
        // Bordas do gap neon col2
        ctx.strokeStyle = col2; ctx.shadowColor = col2; ctx.lineWidth = lw * 0.8;
        [[gS, gE], [gE, gS + Math.PI*2]].forEach(([a]) => {
          const ex = Math.cos(a) * r * 0.82;
          const ey = Math.sin(a) * r * 0.82;
          ctx.beginPath();
          ctx.moveTo(ex * 0.62, ey * 0.62);
          ctx.lineTo(ex, ey);
          ctx.stroke();
        });
        // Inner ring menor
        ctx.globalAlpha = alpha * 0.30;
        ctx.strokeStyle = col; ctx.lineWidth = lw * 0.4;
        ctx.beginPath(); ctx.arc(0, 0, r * 0.62, 0, Math.PI*2); ctx.stroke();
        break;
      }
    }
    ctx.restore();
  }

  // Colisão: nave explode APENAS quando fisicamente toca o obstáculo na tela
  collides(tAngle) {
    if (this.z <= 1) return false;

    // Raio do anel do obstáculo na tela
    const sc       = FOV / this.z;
    const obsR     = Math.min(W, H) * T_RAD_RATIO * sc * (this.type === 3 ? 0.82 : 1.0);
    // Raio fixo da nave na tela
    const playerR  = Math.min(W, H) * T_RAD_RATIO * 0.82;
    // Metade do hitbox da nave (apertado para ser justo)
    const shipHalf = Math.min(W, H) * 0.030;
    // Espessura visual do obstáculo
    const halfThick = this.type === 0
      ? obsR * 0.09                  // metade da altura das barras
      : Math.max(2, 5 * sc) * 0.7;  // metade da linha do anel

    // Só colide se o anel do obstáculo estiver sobrepondo a posição da nave na tela
    if (Math.abs(obsR - playerR) > halfThick + shipHalf) return false;

    // Ângulo do jogador no referencial local do obstáculo
    const a = norm(PLAYER_ANGLE_DEFAULT - tAngle - this.rot);

    switch(this.type) {
      case 0: { // Barras horizontais: gap no centro (90°/270°), perigo em 0°/180°
        const safeZone = Math.PI * 0.22;
        return !( inZone(a, Math.PI/2, safeZone) || inZone(a, 3*Math.PI/2, safeZone) );
      }
      case 1: { // Espinhos em 0°, 90°, 180°, 270°
        const spikeW = Math.PI * 0.12;
        for (let i = 0; i < 4; i++) {
          if (inZone(a, i * Math.PI / 2, spikeW)) return true;
        }
        return false;
      }
      case 3: { // Anel com gap: seguro apenas dentro do gap
        const gS = norm(this.gapAngle - this.gapSize / 2);
        const gE = norm(this.gapAngle + this.gapSize / 2);
        return !inArc(a, gS, gE);
      }
    }
    return false;
  }
}

function norm(a) { return ((a % (Math.PI*2)) + Math.PI*2) % (Math.PI*2); }
function inZone(a, center, half) {
  const d = Math.abs(norm(a - center) - Math.PI);
  return Math.abs(d - Math.PI) < half;
}
function inArc(a, s, e) {
  if (s <= e) return a >= s && a <= e;
  return a >= s || a <= e;
}

// ── Fundo: estrelas ───────────────────────────────────────────────
const STARS = Array.from({length:70}, () => ({x:Math.random(),y:Math.random(),r:0.4+Math.random()*1.4,sp:0.1+Math.random()*0.5}));
let bgT = 0;
function drawStars(dt, col) {
  bgT += dt;
  ctx.save();
  STARS.forEach(s => {
    s.x -= s.sp * dt * 0.04; if (s.x < 0) { s.x=1; s.y=Math.random(); }
    ctx.globalAlpha = (0.12 + 0.08*Math.sin(bgT*s.sp*2 + s.y*8)) * 0.8;
    ctx.fillStyle = col; ctx.shadowColor = col; ctx.shadowBlur = 3;
    ctx.beginPath(); ctx.arc(s.x*W, s.y*H, s.r, 0, Math.PI*2); ctx.fill();
  });
  ctx.restore();
}

// ── Túnel (anéis + linhas) ────────────────────────────────────────
let tunnelZ = 0; // offset de scroll

function drawTunnel(col, wallCol) {
  const nLines = 8;
  for (let i = 20; i >= 0; i--) {
    const z = i * RING_GAP - (tunnelZ % RING_GAP);
    if (z <= 0) continue;
    const sc = FOV / z;
    const r  = Math.min(W,H) * T_RAD_RATIO * sc;
    if (r < 3 || r > Math.max(W,H)*2.5) continue;
    const alpha = Math.min(0.65, (1 - z/ZFAR) * 1.2) * 0.55;
    // anel
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.strokeStyle = col; ctx.shadowColor = col; ctx.shadowBlur = 5;
    ctx.lineWidth   = Math.max(0.5, 1.2 * sc);
    ctx.beginPath(); ctx.arc(CX, CY, r, 0, Math.PI*2); ctx.stroke();
    // Linhas longitudinais (rotacionam com túnel)
    if (i % 2 === 0 && i > 0) {
      const z2 = (i-1)*RING_GAP - (tunnelZ % RING_GAP);
      if (z2 > 0) {
        const sc2 = FOV/z2, r2 = Math.min(W,H)*T_RAD_RATIO*sc2;
        ctx.lineWidth = 0.4; ctx.globalAlpha = alpha * 0.40;
        for (let j = 0; j < nLines; j++) {
          const a = j * Math.PI*2/nLines; // já rotacionado pelo ctx geral
          ctx.beginPath();
          ctx.moveTo(CX + Math.cos(a)*r,  CY + Math.sin(a)*r);
          ctx.lineTo(CX + Math.cos(a)*r2, CY + Math.sin(a)*r2);
          ctx.stroke();
        }
      }
    }
    ctx.restore();
  }
}

// ── Nave (player) ─────────────────────────────────────────────────
// Sempre na base do túnel: posição fixa na tela
function getPlayerScreenPos() {
  const r = Math.min(W,H) * T_RAD_RATIO * 0.82; // um pouco dentro da borda
  return {
    x: CX,
    y: CY + r,
    r: Math.min(W,H) * 0.040
  };
}

function drawShip(col, col2, dt) {
  const { x, y, r: pr } = getPlayerScreenPos();
  enginePulse += dt * 8;

  // Rastro do motor
  spawnTrail(x, y + pr * 0.8, col2);
  spawnTrail(x - pr*0.5, y + pr * 0.7, col);
  spawnTrail(x + pr*0.5, y + pr * 0.7, col);

  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(shipTilt * 0.35); // leve inclinação ao virar

  // ── Fuselagem principal ──
  const g = ctx.createLinearGradient(0, -pr*1.8, 0, pr*0.8);
  g.addColorStop(0, '#ffffff');
  g.addColorStop(0.3, col);
  g.addColorStop(1, col2);
  ctx.shadowColor = col; ctx.shadowBlur = 22;
  ctx.fillStyle = g;

  ctx.beginPath();
  ctx.moveTo(0,        -pr*1.85);  // ponta da nave
  ctx.lineTo(-pr*0.38, -pr*0.40);  // lateral esq (cintura)
  ctx.lineTo(-pr*0.28,  pr*0.80);  // cauda esq
  ctx.lineTo( 0,         pr*0.40);  // centro cauda
  ctx.lineTo( pr*0.28,   pr*0.80);  // cauda dir
  ctx.lineTo( pr*0.38, -pr*0.40);  // lateral dir
  ctx.closePath();
  ctx.fill();

  // Borda neon
  ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 1.2; ctx.shadowBlur = 6;
  ctx.stroke();

  // ── Asas ──
  ctx.fillStyle = col + 'cc'; ctx.shadowBlur = 14;
  // Asa esquerda
  ctx.beginPath();
  ctx.moveTo(-pr*0.32, -pr*0.20);
  ctx.lineTo(-pr*1.60,  pr*0.40);
  ctx.lineTo(-pr*1.10,  pr*0.85);
  ctx.lineTo(-pr*0.28,  pr*0.60);
  ctx.closePath(); ctx.fill();
  // Asa direita
  ctx.beginPath();
  ctx.moveTo( pr*0.32, -pr*0.20);
  ctx.lineTo( pr*1.60,  pr*0.40);
  ctx.lineTo( pr*1.10,  pr*0.85);
  ctx.lineTo( pr*0.28,  pr*0.60);
  ctx.closePath(); ctx.fill();

  // Borda das asas
  ctx.strokeStyle = col; ctx.lineWidth = 1; ctx.shadowBlur = 8;
  // ponteiras das asas
  ctx.beginPath(); ctx.moveTo(-pr*1.60, pr*0.40); ctx.lineTo(-pr*1.10, pr*0.85); ctx.stroke();
  ctx.beginPath(); ctx.moveTo( pr*1.60, pr*0.40); ctx.lineTo( pr*1.10, pr*0.85); ctx.stroke();

  // ── Cockpit ──
  const cg = ctx.createRadialGradient(0, -pr*0.90, 0, 0, -pr*0.90, pr*0.38);
  cg.addColorStop(0, '#ffffff');
  cg.addColorStop(0.5, col2 + 'cc');
  cg.addColorStop(1, 'transparent');
  ctx.fillStyle = cg; ctx.shadowBlur = 0;
  ctx.beginPath(); ctx.ellipse(0, -pr*0.90, pr*0.22, pr*0.38, 0, 0, Math.PI*2); ctx.fill();

  // ── Motores (2) ──
  const ef = 0.7 + 0.3*Math.sin(enginePulse);
  [-pr*0.42, pr*0.42].forEach(ex => {
    // carcaça do motor
    ctx.fillStyle = '#111'; ctx.shadowBlur = 0;
    ctx.beginPath(); ctx.ellipse(ex, pr*0.75, pr*0.18, pr*0.10, 0, 0, Math.PI*2); ctx.fill();
    // chama
    const mg = ctx.createRadialGradient(ex, pr*0.80, 0, ex, pr*0.90, pr*0.22*ef);
    mg.addColorStop(0, '#ffffff');
    mg.addColorStop(0.3, col2);
    mg.addColorStop(1, 'transparent');
    ctx.fillStyle = mg; ctx.shadowColor = col2; ctx.shadowBlur = 14;
    ctx.beginPath(); ctx.ellipse(ex, pr*0.85, pr*0.14*ef, pr*0.22*ef, 0, 0, Math.PI*2); ctx.fill();
  });

  // ── Luz de posição (blink) ──
  ctx.shadowColor = '#ff4444'; ctx.shadowBlur = 8;
  ctx.fillStyle   = '#ff4444';
  ctx.globalAlpha = 0.6 + 0.4*Math.sin(enginePulse * 0.5);
  ctx.beginPath(); ctx.arc(-pr*1.55, pr*0.42, pr*0.07, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#44ff44';
  ctx.beginPath(); ctx.arc( pr*1.55, pr*0.42, pr*0.07, 0, Math.PI*2); ctx.fill();

  ctx.restore();
}

// ── Game Loop ─────────────────────────────────────────────────────
let lastTs = 0, frameId = null;

function loop(ts) {
  frameId = requestAnimationFrame(loop);
  const dt = Math.min((ts - lastTs) / 1000, 0.05);
  lastTs = ts;

  const ph   = PHASES[phaseIdx % PHASES.length];
  const col  = ph.col, col2 = ph.col2;

  // ── Background ──
  ctx.fillStyle = '#00000e';
  ctx.fillRect(0, 0, W, H);
  const bg = ctx.createRadialGradient(CX, CY, 0, CX, CY, Math.min(W,H)*0.55);
  bg.addColorStop(0, ph.wall + 'ff');
  bg.addColorStop(1, '#000008ff');
  ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);

  drawStars(dt, col);

  // ── Game logic ──
  if (state === 'playing' && !playerDead) {
    totalTime  += dt;
    score       = Math.floor(totalTime * 14 + speed * 0.04);
    phaseTimer -= dt;
    speed       = BASE_SPD + totalTime * 25;

    if (phaseTimer <= 0) {
      phaseTimer = PHASE_DUR;
      phaseIdx++;
      addFloat(`FASE ${phaseIdx+1} — ${PHASES[phaseIdx % PHASES.length].name}`, PHASES[phaseIdx % PHASES.length].col);
    }

    tunnelZ += speed * dt;

    // Rotação do túnel baseada no input
    const rotSpd = 2.8 + speed * 0.0010;
    let rotInput = 0;
    if (keyLeft)       rotInput -= rotSpd;
    if (keyRight)      rotInput += rotSpd;
    if (isTouching && touchDX !== 0) rotInput += touchDX * 0.018 * rotSpd;
    tunnelAngle += rotInput * dt;
    shipTilt    += (rotInput * 0.35 - shipTilt) * Math.min(1, dt * 6);

    // Spawn de obstáculos
    while (!obstacles.length || obstacles[obstacles.length-1].z < ZFAR - RING_GAP*3) {
      const lastZ = obstacles.length ? obstacles[obstacles.length-1].z : ZFAR;
      obstacles.push(new Obstacle(lastZ + RING_GAP*(8.0 + Math.random()*4.0)));
    }

    obstacles.forEach(o => o.update(dt, speed));
    obstacles = obstacles.filter(o => !o.dead);

    // Colisão
    for (const obs of obstacles) {
      if (obs.collides(tunnelAngle)) {
        playerDead = true;
        deathFlash = 1.0;
        const { x, y } = getPlayerScreenPos();
        spawnBurst(x, y, col, 32);
        spawnBurst(x, y, '#ffffff', 12);
        setTimeout(showGameOver, 950);
        break;
      }
    }

    particles.forEach(p => p.update(dt));
    particles = particles.filter(p => p.life > 0);
    document.getElementById('hudScore').textContent = score;
    document.getElementById('hudScore').style.color = col;
    document.getElementById('hudPhase').textContent = `FASE ${phaseIdx+1} — ${ph.name}`;
    touchDX = 0;

  } else if (state === 'dead' || state === 'idle') {
    tunnelZ += (state === 'idle' ? 80 : 35) * dt;
    particles.forEach(p => p.update(dt));
    particles = particles.filter(p => p.life > 0);
    if (state === 'idle') {
      // Rotação lenta decorativa na tela inicial
      tunnelAngle += 0.18 * dt;
    }
  }

  // ── Render: tudo que gira com o túnel ──
  ctx.save();
  ctx.translate(CX, CY);
  ctx.rotate(tunnelAngle);
  ctx.translate(-CX, -CY);
  drawTunnel(col, ph.wall);
  obstacles.forEach(o => o.draw(col, col2));
  ctx.restore();

  // ── Nave (fora da rotação do túnel) ──
  if (state === 'playing' && !playerDead) drawShip(col, col2, dt);

  // ── Partículas ──
  ctx.save(); particles.forEach(p => p.draw()); ctx.restore();

  // ── Death flash ──
  if (deathFlash > 0) {
    deathFlash -= dt * 3.2;
    ctx.save(); ctx.globalAlpha = Math.max(0, deathFlash) * 0.75;
    ctx.fillStyle = '#ff1122'; ctx.fillRect(0, 0, W, H); ctx.restore();
  }

  // ── Float messages ──
  floatMsgs = floatMsgs.filter(m => m.alpha > 0);
  floatMsgs.forEach(m => {
    m.y += m.vy * dt; m.alpha -= dt * 0.65; m.vy *= 0.96;
    ctx.save();
    ctx.globalAlpha = Math.max(0, Math.min(1, m.alpha));
    ctx.font = `bold ${Math.round(Math.min(W,H)*0.042)}px Courier New`;
    ctx.textAlign = 'center'; ctx.fillStyle = m.col;
    ctx.shadowColor = m.col; ctx.shadowBlur = 18;
    ctx.fillText(m.txt, CX, m.y); ctx.restore();
  });
}

// ── Start / Game Over ─────────────────────────────────────────────
function startGame() {
  if (frameId) cancelAnimationFrame(frameId);
  state = 'playing'; score = 0; totalTime = 0;
  speed = BASE_SPD; phaseIdx = 0; phaseTimer = PHASE_DUR;
  tunnelAngle = 0; tunnelZ = 0;
  playerDead = false; deathFlash = 0; shipTilt = 0;
  obstacles = []; particles = []; floatMsgs = [];
  keyLeft = keyRight = false; touchDX = 0;
  lastTs = 0;
  hideOvs();
  document.getElementById('hud').style.display = 'flex';
  document.getElementById('hudBest').textContent = bestScore > 0 ? 'RECORDE: '+bestScore : '';
  frameId = requestAnimationFrame(loop);
}

function showGameOver() {
  state = 'dead';
  if (score > bestScore) { bestScore = score; localStorage.setItem('trBest', bestScore); }
  document.getElementById('hud').style.display = 'none';
  document.getElementById('goScore').textContent = score;
  document.getElementById('goBest').textContent  = 'Recorde: ' + bestScore;
  showOv('ovGameOver');
  saveScoreCloud();
}

// ── Ranking ───────────────────────────────────────────────────────
async function showRanking() {
  showOv('ovRanking');
  document.getElementById('rankList').innerHTML = '<div class="ov-sub">Carregando...</div>';
  const { data, error } = await supa.from('tr_scores')
    .select('user_id, best_score, profiles(username)')
    .order('best_score', { ascending: false }).limit(15);
  if (error || !data?.length) {
    document.getElementById('rankList').innerHTML = '<div class="ov-sub" style="color:rgba(255,255,255,0.25)">Nenhum score ainda.</div>';
    return;
  }
  let html = '<table class="rank-table">';
  data.forEach((r, i) => {
    const name  = r.profiles?.username || 'Anônimo';
    const isMe  = supaUser && r.user_id === supaUser.id;
    const medal = i===0?'🥇':i===1?'🥈':i===2?'🥉':(i+1)+'°';
    html += `<tr class="${isMe?'rank-me':''}"><td class="rank-pos">${medal}</td><td class="rank-name">${name}${isMe?' 👈':''}</td><td class="rank-sc">${r.best_score}</td></tr>`;
  });
  document.getElementById('rankList').innerHTML = html + '</table>';
}

// ── Auth ──────────────────────────────────────────────────────────
function switchTab(t) {
  const l = t==='login';
  document.getElementById('formLogin').style.display  = l?'flex':'none';
  document.getElementById('formSignup').style.display = l?'none':'flex';
  document.getElementById('tabLogin').style.background  = l?'rgba(255,68,170,0.18)':'transparent';
  document.getElementById('tabSignup').style.background = l?'transparent':'rgba(0,255,136,0.14)';
  document.getElementById('tabLogin').style.color  = l?'#fff':'rgba(255,255,255,0.38)';
  document.getElementById('tabSignup').style.color = l?'rgba(255,255,255,0.38)':'#fff';
  document.getElementById('loginMsg').textContent = document.getElementById('signupMsg').textContent = '';
}
async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass  = document.getElementById('loginPass').value;
  document.getElementById('loginMsg').textContent = 'Entrando...';
  const { data, error } = await supa.auth.signInWithPassword({ email, password: pass });
  if (error) { document.getElementById('loginMsg').textContent = '✗ '+error.message; return; }
  supaUser = data.user; await loadProfile(); updateUserUI(); showOv('ovStart');
}
async function doSignup() {
  const username = document.getElementById('signupUser').value.trim();
  const email    = document.getElementById('signupEmail').value.trim();
  const pass     = document.getElementById('signupPass').value;
  if (!username) { document.getElementById('signupMsg').textContent = '✗ Informe um nome'; return; }
  document.getElementById('signupMsg').textContent = 'Criando...';
  const { data, error } = await supa.auth.signUp({ email, password: pass });
  if (error) { document.getElementById('signupMsg').textContent = '✗ '+error.message; return; }
  supaUser = data.user;
  await supa.from('profiles').upsert({ user_id: supaUser.id, username }, { onConflict:'user_id' });
  supaProfile = { username }; updateUserUI();
  document.getElementById('signupMsg').textContent = '✅ Bem-vindo, '+username+'!';
  setTimeout(() => showOv('ovStart'), 1400);
}
async function doSignOut() {
  await supa.auth.signOut(); supaUser = null; supaProfile = null; updateUserUI(); showOv('ovStart');
}
async function loadProfile() {
  if (!supaUser) return;
  const { data } = await supa.from('profiles').select('username').eq('user_id', supaUser.id).single();
  supaProfile = data || null;
}
function updateUserUI() {
  const ok = !!supaUser && !!supaProfile;
  document.getElementById('userBadge').style.display = ok ? 'block' : 'none';
  if (ok) document.getElementById('badgeUser').textContent = supaProfile.username;
}
async function saveScoreCloud() {
  document.getElementById('goSaveMsg').textContent = '';
  if (!supaUser) return;
  try {
    const { data: ex } = await supa.from('tr_scores').select('best_score').eq('user_id', supaUser.id).single();
    if (score > (ex?.best_score ?? 0)) {
      await supa.from('tr_scores').upsert({ user_id: supaUser.id, best_score: score }, { onConflict:'user_id' });
      document.getElementById('goSaveMsg').textContent = '🏆 Novo recorde salvo!';
    }
  } catch(_) {}
}

// ── Boot ──────────────────────────────────────────────────────────
bestScore = parseInt(localStorage.getItem('trBest') || '0');
if (bestScore > 0) {
  document.getElementById('ovBestRow').style.display = 'block';
  document.getElementById('ovBestTxt').textContent   = '🏆 Recorde: ' + bestScore;
}
(async () => {
  const { data: { session } } = await supa.auth.getSession();
  if (session) { supaUser = session.user; await loadProfile(); updateUserUI(); }
})();

// Loop decorativo na tela inicial
state = 'idle'; phaseIdx = 0; phaseTimer = PHASE_DUR; totalTime = 0;
speed = BASE_SPD; tunnelZ = 0; tunnelAngle = 0;
obstacles = []; particles = []; floatMsgs = [];
// Pré-spawn de alguns obstáculos decorativos
for (let i = 1; i <= 5; i++) obstacles.push(new Obstacle(RING_GAP * i * 5.5 + 300));
lastTs = 0;
frameId = requestAnimationFrame(loop);
</script>
