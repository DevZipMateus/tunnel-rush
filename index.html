<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Tunnel Rush</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; background:#000; overflow:hidden; font-family:'Courier New',monospace; touch-action:none; }
  canvas { display:block; }

  .overlay {
    display:none; position:fixed; inset:0;
    background:rgba(0,0,0,0.85);
    flex-direction:column; align-items:center; justify-content:center;
    gap:14px; z-index:10; padding:20px; text-align:center;
  }
  .overlay.show { display:flex; }
  .ov-title {
    font-size:clamp(2rem,8vw,3.5rem); font-weight:900;
    letter-spacing:0.12em; line-height:1.1;
    text-shadow:0 0 20px currentColor, 0 0 60px currentColor;
  }
  .ov-sub { font-size:clamp(0.75rem,2.5vw,0.95rem); color:rgba(255,255,255,0.5); letter-spacing:0.06em; max-width:360px; }
  .ov-score { font-size:clamp(1rem,3.5vw,1.5rem); color:#fff; letter-spacing:0.08em; }
  .ov-best  { font-size:clamp(0.7rem,2.2vw,0.85rem); color:rgba(255,255,255,0.38); }
  .ov-btn {
    padding:12px 36px; border:2px solid currentColor; background:transparent;
    color:inherit; font-family:'Courier New',monospace; font-size:clamp(0.8rem,2.5vw,1rem);
    font-weight:bold; letter-spacing:0.14em; cursor:pointer; border-radius:4px;
    text-shadow:0 0 8px currentColor; box-shadow:0 0 12px currentColor;
    transition:background .18s;
  }
  .ov-btn:hover { background:rgba(255,255,255,0.10); }
  .ov-btn-sm { padding:7px 18px; font-size:clamp(0.62rem,1.8vw,0.75rem); opacity:0.65; }
  .auth-form { display:flex; flex-direction:column; gap:8px; width:100%; max-width:280px; }
  .auth-form input {
    padding:10px 14px; background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.18); border-radius:4px;
    color:#fff; font-family:'Courier New',monospace; font-size:0.85rem; outline:none;
  }
  .auth-form input:focus { border-color:rgba(255,255,255,0.45); }
  .auth-msg { font-size:0.72rem; min-height:16px; }
  .rank-table { width:100%; max-width:320px; border-collapse:collapse; font-size:clamp(0.62rem,1.9vw,0.78rem); }
  .rank-table td { padding:5px 7px; }
  .rank-pos  { color:rgba(255,255,255,0.4); width:28px; text-align:center; }
  .rank-name { color:rgba(255,255,255,0.8); }
  .rank-sc   { color:#fff; font-weight:bold; text-align:right; }
  .rank-me td { color:#fff !important; }
  #hud {
    position:fixed; top:0; left:0; right:0;
    display:flex; justify-content:space-between; align-items:flex-start;
    padding:10px 16px; pointer-events:none; z-index:5;
  }
  #hudScore { font-size:clamp(1.1rem,3.5vw,1.6rem); font-weight:bold; letter-spacing:0.08em; text-shadow:0 0 10px currentColor; }
  #hudPhase { font-size:clamp(0.58rem,1.8vw,0.72rem); color:rgba(255,255,255,0.38); letter-spacing:0.12em; margin-top:2px; }
  #hudBest  { font-size:clamp(0.58rem,1.8vw,0.7rem);  color:rgba(255,255,255,0.28); letter-spacing:0.06em; text-align:right; }
  #ctrlHint { position:fixed; bottom:14px; left:50%; transform:translateX(-50%); font-size:clamp(0.55rem,1.6vw,0.68rem); color:rgba(255,255,255,0.22); letter-spacing:0.1em; pointer-events:none; z-index:5; }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="hud" style="display:none">

<!-- Start -->
<div class="overlay show" id="ovStart">

  <div class="ov-sub">Sobreviva no túnel infinito. O túnel gira — você fica na base.</div>

  <div id="rankList" style="width:100%;max-width:320px;min-height:60px;display:flex;align-items:center;justify-content:center">
    <div class="ov-sub">Carregando...</div>
  </div>
  <button class="ov-btn ov-btn-sm" style="color:rgba(255,255,255,0.3);margin-top:6px" onclick="showOv('ovStart')">← VOLTAR</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ═══════════════════════════════════════════════════════════════
//  TUNNEL RUSH  v2.0  —  Nave fixa na base, túnel gira
// ═══════════════════════════════════════════════════════════════

const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');

let W, H, CX, CY;
function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  CX = W / 2; CY = H / 2;
}
window.addEventListener('resize', resize);
resize();

// ── Fases ────────────────────────────────────────────────────────
const PHASES = [
  { name:'CLÁSSICO', col:'#ff2200', col2:'#ff6644', wall:'#000000', ringCol:'#ffffff', classic:true },
  { name:'NEXUS',    col:'#00ffff', col2:'#0055ff', wall:'#001833', ringCol:'#00ffff' },
  { name:'INFERNO',  col:'#ff3300', col2:'#ff9900', wall:'#1a0500', ringCol:'#ff5500' },
  { name:'ACID',     col:'#aaff00', col2:'#00ff44', wall:'#061a00', ringCol:'#aaff00' },
  { name:'VORTEX',   col:'#cc00ff', col2:'#ff00aa', wall:'#120020', ringCol:'#dd44ff' },
  { name:'SOLAR',    col:'#ffd700', col2:'#ff6600', wall:'#1a1000', ringCol:'#ffd700' },
  { name:'FREEZE',   col:'#88eeff', col2:'#aaaaff', wall:'#000d1a', ringCol:'#88eeff' },
];

// ── Constantes ───────────────────────────────────────────────────
const FOV      = 380;
const ZNEAR    = 55;
const ZFAR     = 1600;
const RING_GAP = 100;
const BASE_SPD = 380;
const PHASE_DUR = 30;
// Raio do túnel na tela em relação ao menor lado
const T_RAD_RATIO = 0.43;
// O jogador fica na borda INFERIOR do túnel visível
const PLAYER_ANGLE_DEFAULT = Math.PI / 2; // baixo (90°)

// ── Estado ───────────────────────────────────────────────────────
let state = 'idle';
let score, bestScore, totalTime, speed, phaseIdx, phaseTimer;
let tunnelAngle = 0;   // ângulo de rotação do túnel (o jogador fica parado)
let obstacles = [], particles = [], floatMsgs = [];
let deathFlash = 0, playerDead = false;
let shipTilt = 0;      // inclinação visual da nave
let enginePulse = 0;

// ── Supabase ─────────────────────────────────────────────────────
const SUPA_URL = 'https://tzxdkkoajxwgkphzixyr.supabase.co';
const SUPA_KEY = 'sb_publishable_7T9duH_ZzV7eOywjYPekTg_zLOk9bDx';
const supa = window.supabase.createClient(SUPA_URL, SUPA_KEY);
let supaUser = null, supaProfile = null;

// ── Input ────────────────────────────────────────────────────────
let keyLeft = false, keyRight = false;
let touchDX = 0, lastTouchX = 0, isTouching = false;

window.addEventListener('keydown', e => {
  if (e.key==='ArrowLeft' ||e.key==='a'||e.key==='A') keyLeft  = true;
  if (e.key==='ArrowRight'||e.key==='d'||e.key==='D') keyRight = true;
  if ((e.key===' '||e.key==='Enter') && state!=='playing') startGame();
});
window.addEventListener('keyup', e => {
  if (e.key==='ArrowLeft' ||e.key==='a'||e.key==='A') keyLeft  = false;
  if (e.key==='ArrowRight'||e.key==='d'||e.key==='D') keyRight = false;
});
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (state!=='playing') { startGame(); return; }
  lastTouchX = e.touches[0].clientX;
  isTouching = true; touchDX = 0;
}, {passive:false});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!isTouching) return;
  touchDX = e.touches[0].clientX - lastTouchX;
  lastTouchX = e.touches[0].clientX;
}, {passive:false});
canvas.addEventListener('touchend', e => {
  e.preventDefault();
  isTouching = false; touchDX = 0;
}, {passive:false});
canvas.addEventListener('click', () => { if (state!=='playing') startGame(); });

// ── Overlays ─────────────────────────────────────────────────────
function showOv(id) { document.querySelectorAll('.overlay').forEach(o=>o.classList.remove('show')); document.getElementById(id).classList.add('show'); }
function hideOvs()  { document.querySelectorAll('.overlay').forEach(o=>o.classList.remove('show')); }

// ── Partículas ───────────────────────────────────────────────────
class Particle {
  constructor(x,y,vx,vy,col,life,r) { this.x=x;this.y=y;this.vx=vx;this.vy=vy;this.col=col;this.life=life;this.maxLife=life;this.r=r; }
  update(dt) { this.x+=this.vx*dt; this.y+=this.vy*dt; this.vy+=55*dt; this.life-=dt; }
  draw() {
    const a=Math.max(0,this.life/this.maxLife);
    ctx.save(); ctx.globalAlpha=a; ctx.fillStyle=this.col; ctx.shadowColor=this.col; ctx.shadowBlur=8;
    ctx.beginPath(); ctx.arc(this.x,this.y,this.r*a,0,Math.PI*2); ctx.fill(); ctx.restore();
  }
}
function spawnBurst(x,y,col,n=24) {
  for(let i=0;i<n;i++) {
    const a=Math.random()*Math.PI*2, sp=80+Math.random()*280;
    particles.push(new Particle(x,y,Math.cos(a)*sp,Math.sin(a)*sp,col,0.5+Math.random()*0.8,2+Math.random()*5));
  }
}
function spawnTrail(x,y,col) {
  particles.push(new Particle(x,y,(Math.random()-.5)*20,(Math.random()-.5)*20+12,col,0.10+Math.random()*0.10,1+Math.random()*2.5));
}

// ── Float messages ───────────────────────────────────────────────
function addFloat(txt, col) {
  floatMsgs.push({ txt, col, y: CY*0.28, alpha:1.2, vy:-38 });
}

// ── Obstáculos ───────────────────────────────────────────────────
// Obstáculos como painéis por face do hexágono — igual ao Tunnel Rush original
class Obstacle {
  constructor(z) {
    this.z    = z;
    this.dead = false;

    // Quais das 6 faces hexagonais estão BLOQUEADAS
    this.faces = this.generatePattern();

    // Rotação alinhada a face do hexágono (múltiplos de 60°)
    this.rot = Math.floor(Math.random() * 6) * (Math.PI / 3);
  }

  generatePattern() {
    // Padrões: quais faces são bloqueadas (true = bloqueada)
    const patterns = [
      [1,1,1,1,1,0], // 5 bloqueadas, 1 gap
      [1,1,1,1,0,0], // 4 bloqueadas, 2 gaps adjacentes
      [1,0,1,1,0,1], // 4 bloqueadas, 2 gaps alternados
      [1,1,0,1,1,0], // 4 bloqueadas, gaps opostos
      [1,0,1,0,1,0], // 3 bloqueadas, alternando (mais fácil)
      [1,1,0,0,1,1], // 4 bloqueadas, 2 gaps no meio
    ];
    const base   = patterns[Math.floor(Math.random() * patterns.length)];
    const offset = Math.floor(Math.random() * 6);
    return Array.from({length: 6}, (_, i) => !!base[(i + offset) % 6]);
  }

  update(dt, spd) {
    this.z -= spd * dt;
    if (this.z < -ZNEAR * 3) this.dead = true;
  }

  draw(col, col2) {
    if (this.z <= 1) return;
    const sc = FOV / this.z;
    const r  = Math.min(W, H) * T_RAD_RATIO * sc;
    if (r < 3 || r > Math.max(W, H) * 3) return;

    const alpha = Math.min(1, (this.z - ZNEAR) / (ZNEAR * 1.8)) * 0.96;
    if (alpha <= 0) return;

    const N      = 6;
    const rOuter = r * 0.97;
    const rInner = r * 0.50; // painéis só até metade — centro sempre visível

    ctx.save();
    ctx.translate(CX, CY);
    ctx.rotate(this.rot);
    ctx.globalAlpha = alpha;
    ctx.fillStyle   = col;
    ctx.shadowColor = col;
    ctx.shadowBlur  = 14 + 8 * sc;

    for (let j = 0; j < N; j++) {
      if (!this.faces[j]) continue; // face aberta — não desenha

      const a1 = j       * Math.PI * 2 / N;
      const a2 = (j + 1) * Math.PI * 2 / N;

      ctx.beginPath();
      ctx.moveTo(Math.cos(a1) * rInner, Math.sin(a1) * rInner);
      ctx.lineTo(Math.cos(a1) * rOuter, Math.sin(a1) * rOuter);
      ctx.lineTo(Math.cos(a2) * rOuter, Math.sin(a2) * rOuter);
      ctx.lineTo(Math.cos(a2) * rInner, Math.sin(a2) * rInner);
      ctx.closePath();
      ctx.fill();

      // Borda neon na aresta da face
      ctx.globalAlpha = alpha * 0.75;
      ctx.strokeStyle = col2;
      ctx.shadowColor = col2;
      ctx.lineWidth   = Math.max(1.5, 4 * sc);
      ctx.stroke();
      ctx.globalAlpha = alpha;
    }

    ctx.restore();
  }

  collides(tAngle) {
    if (this.z <= 1) return false;

    const sc      = FOV / this.z;
    const obsR    = Math.min(W, H) * T_RAD_RATIO * sc;
    const playerR = Math.min(W, H) * T_RAD_RATIO * 0.82;
    const thick   = obsR * 0.20 + Math.min(W, H) * 0.028;

    if (Math.abs(obsR - playerR) > thick) return false;

    // Ângulo do jogador no espaço local do obstáculo
    const a       = norm(PLAYER_ANGLE_DEFAULT - tAngle - this.rot);
    const faceIdx = Math.floor(a / (Math.PI * 2 / 6)) % 6;
    return this.faces[faceIdx]; // true = face bloqueada = colisão
  }
}

function norm(a) { return ((a % (Math.PI*2)) + Math.PI*2) % (Math.PI*2); }
function inZone(a, center, half) {
  const d = Math.abs(norm(a - center) - Math.PI);
  return Math.abs(d - Math.PI) < half;
}
function inArc(a, s, e) {
  if (s <= e) return a >= s && a <= e;
  return a >= s || a <= e;
}

// ── Fundo: estrelas ───────────────────────────────────────────────
const STARS = Array.from({length:70}, () => ({x:Math.random(),y:Math.random(),r:0.4+Math.random()*1.4,sp:0.1+Math.random()*0.5}));
let bgT = 0;
function drawStars(dt, col) {
  bgT += dt;
  ctx.save();
  STARS.forEach(s => {
    s.x -= s.sp * dt * 0.04; if (s.x < 0) { s.x=1; s.y=Math.random(); }
    ctx.globalAlpha = (0.12 + 0.08*Math.sin(bgT*s.sp*2 + s.y*8)) * 0.8;
    ctx.fillStyle = col; ctx.shadowColor = col; ctx.shadowBlur = 3;
    ctx.beginPath(); ctx.arc(s.x*W, s.y*H, s.r, 0, Math.PI*2); ctx.fill();
  });
  ctx.restore();
}

// ── Túnel (anéis + linhas) ────────────────────────────────────────
let tunnelZ = 0; // offset de scroll

function drawTunnel(col, wallCol, ringCol) {
  const N = 6;
  // Índice world-space para xadrez estável (não pisca)
  const baseRing = Math.floor(tunnelZ / RING_GAP);

  // Sombreamento direcional por face (simula luz vindo do topo)
  const faceShade = Array.from({length: N}, (_, j) => {
    const angle = (j + 0.5) * Math.PI * 2 / N - Math.PI / 2;
    return 0.55 + 0.45 * Math.cos(angle); // 0.10 (baixo) a 1.0 (cima)
  });

  for (let i = 26; i >= 1; i--) {
    const z0 = i       * RING_GAP - (tunnelZ % RING_GAP);
    const z1 = (i - 1) * RING_GAP - (tunnelZ % RING_GAP);
    if (z0 <= 1 || z1 <= 1) continue;

    const sc0 = FOV / z0, r0 = Math.min(W, H) * T_RAD_RATIO * sc0;
    const sc1 = FOV / z1, r1 = Math.min(W, H) * T_RAD_RATIO * sc1;
    if (r0 < 2 || r1 > Math.max(W, H) * 6) continue;

    // Depth fog: perto = brilhante, longe = escuro
    const fog = Math.pow(Math.min(1, (1 - z0 / ZFAR) * 1.6), 1.4);
    if (fog <= 0.01) continue;

    const worldBand = baseRing + i; // índice estável no mundo

    for (let j = 0; j < N; j++) {
      const a1 = j       * Math.PI * 2 / N;
      const a2 = (j + 1) * Math.PI * 2 / N;

      // Xadrez: alterna pelo índice de mundo (não pisca)
      const isWhite = (worldBand + j) % 2 === 0;
      // Sombreamento 3D por face + fog
      const shade = faceShade[j] * fog;

      ctx.save();
      ctx.globalAlpha = isWhite ? shade * 0.82 : shade * 0.06;
      ctx.fillStyle   = isWhite ? '#ffffff' : '#000008';
      ctx.beginPath();
      ctx.moveTo(CX + Math.cos(a1) * r1, CY + Math.sin(a1) * r1);
      ctx.lineTo(CX + Math.cos(a2) * r1, CY + Math.sin(a2) * r1);
      ctx.lineTo(CX + Math.cos(a2) * r0, CY + Math.sin(a2) * r0);
      ctx.lineTo(CX + Math.cos(a1) * r0, CY + Math.sin(a1) * r0);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    // Arestas do hexágono (linhas brancas que definem a estrutura 3D)
    ctx.save();
    ctx.globalAlpha = fog * 0.38;
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth   = Math.max(0.4, 0.9 * sc0);
    ctx.beginPath();
    for (let j = 0; j <= N; j++) {
      const a = j * Math.PI * 2 / N;
      j === 0
        ? ctx.moveTo(CX + Math.cos(a) * r0, CY + Math.sin(a) * r0)
        : ctx.lineTo(CX + Math.cos(a) * r0, CY + Math.sin(a) * r0);
    }
    ctx.closePath();
    ctx.stroke();

    // Arestas longitudinais (cantos do tubo — criam o visual 3D)
    if (i <= 22) {
      ctx.globalAlpha = fog * 0.22;
      ctx.lineWidth   = Math.max(0.3, 0.6 * sc0);
      for (let j = 0; j < N; j++) {
        const a = j * Math.PI * 2 / N;
        ctx.beginPath();
        ctx.moveTo(CX + Math.cos(a) * r0, CY + Math.sin(a) * r0);
        ctx.lineTo(CX + Math.cos(a) * r1, CY + Math.sin(a) * r1);
        ctx.stroke();
      }
    }
    ctx.restore();
  }
}

// ── Nave (player) ─────────────────────────────────────────────────
// Sempre na base do túnel: posição fixa na tela
function getPlayerScreenPos() {
  const r = Math.min(W,H) * T_RAD_RATIO * 0.82; // um pouco dentro da borda
  return {
    x: CX,
    y: CY + r,
    r: Math.min(W,H) * 0.040
  };
}

function drawShip(col, col2, dt) {
  const { x, y, r: pr } = getPlayerScreenPos();
  enginePulse += dt * 8;

  // Rastro sutil
  spawnTrail(x, y + pr * 0.5, col2);
  if (Math.random() < 0.4) spawnTrail(x + (Math.random() - .5) * pr * .6, y + pr * 0.4, col);

  const sz = pr * 0.72;

  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(shipTilt * 0.22);

  // Triângulo branco — igual ao Tunnel Rush original
  ctx.shadowColor = col;
  ctx.shadowBlur  = 24;
  ctx.fillStyle   = '#ffffff';
  ctx.globalAlpha = 0.95;
  ctx.beginPath();
  ctx.moveTo(0,        -sz);        // ponta
  ctx.lineTo(-sz * 0.60,  sz * 0.55); // base esq
  ctx.lineTo( sz * 0.60,  sz * 0.55); // base dir
  ctx.closePath();
  ctx.fill();

  // Camada colorida com pulsação
  ctx.fillStyle   = col;
  ctx.globalAlpha = 0.35 + 0.15 * Math.sin(enginePulse);
  ctx.shadowBlur  = 32;
  ctx.beginPath();
  ctx.moveTo(0,        -sz);
  ctx.lineTo(-sz * 0.60,  sz * 0.55);
  ctx.lineTo( sz * 0.60,  sz * 0.55);
  ctx.closePath();
  ctx.fill();

  ctx.restore();
}

// ── Game Loop ─────────────────────────────────────────────────────
let lastTs = 0, frameId = null;

function loop(ts) {
  frameId = requestAnimationFrame(loop);
  const dt = Math.min((ts - lastTs) / 1000, 0.05);
  lastTs = ts;

  const ph   = PHASES[phaseIdx % PHASES.length];
  const col  = ph.col, col2 = ph.col2;

  // ── Background ──
  const isClassic = ph.classic === true;
  ctx.fillStyle = isClassic ? '#000000' : '#00000e';
  ctx.fillRect(0, 0, W, H);
  if (!isClassic) {
    const bg = ctx.createRadialGradient(CX, CY, 0, CX, CY, Math.min(W,H)*0.55);
    bg.addColorStop(0, ph.wall + 'ff');
    bg.addColorStop(1, '#000008ff');
    ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);
    drawStars(dt, col);
  }

  // ── Game logic ──
  if (state === 'playing' && !playerDead) {
    totalTime  += dt;
    score       = Math.floor(totalTime * 16 + speed * 0.04);
    phaseTimer -= dt;
    speed       = BASE_SPD + totalTime * 38;

    if (phaseTimer <= 0) {
      phaseTimer = PHASE_DUR;
      phaseIdx++;
      addFloat(`FASE ${phaseIdx+1} — ${PHASES[phaseIdx % PHASES.length].name}`, PHASES[phaseIdx % PHASES.length].col);
    }

    tunnelZ += speed * dt;

    // Rotação do túnel baseada no input
    const rotSpd = 2.8 + speed * 0.0010;
    let rotInput = 0;
    if (keyLeft)       rotInput -= rotSpd;
    if (keyRight)      rotInput += rotSpd;
    if (isTouching && touchDX !== 0) rotInput += touchDX * 0.018 * rotSpd;
    tunnelAngle += rotInput * dt;
    shipTilt    += (rotInput * 0.35 - shipTilt) * Math.min(1, dt * 6);

    // Spawn de obstáculos
    while (!obstacles.length || obstacles[obstacles.length-1].z < ZFAR - RING_GAP*3) {
      const lastZ = obstacles.length ? obstacles[obstacles.length-1].z : ZFAR;
      obstacles.push(new Obstacle(lastZ + RING_GAP*(8.0 + Math.random()*4.0)));
    }

    obstacles.forEach(o => o.update(dt, speed));
    obstacles = obstacles.filter(o => !o.dead);

    // Colisão
    for (const obs of obstacles) {
      if (obs.collides(tunnelAngle)) {
        playerDead = true;
        deathFlash = 1.0;
        const { x, y } = getPlayerScreenPos();
        spawnBurst(x, y, col, 32);
        spawnBurst(x, y, '#ffffff', 12);
        setTimeout(showGameOver, 950);
        break;
      }
    }

    particles.forEach(p => p.update(dt));
    particles = particles.filter(p => p.life > 0);
    document.getElementById('hudScore').textContent = score;
    document.getElementById('hudScore').style.color = col;
    document.getElementById('hudPhase').textContent = `FASE ${phaseIdx+1} — ${ph.name}`;
    touchDX = 0;

  } else if (state === 'dead' || state === 'idle') {
    tunnelZ += (state === 'idle' ? 80 : 35) * dt;
    particles.forEach(p => p.update(dt));
    particles = particles.filter(p => p.life > 0);
    if (state === 'idle') {
      // Rotação lenta decorativa na tela inicial
      tunnelAngle += 0.18 * dt;
    }
  }

  // ── Render: tudo que gira com o túnel ──
  ctx.save();
  ctx.translate(CX, CY);
  ctx.rotate(tunnelAngle);
  ctx.translate(-CX, -CY);
  drawTunnel(col, ph.wall, ph.ringCol);
  obstacles.forEach(o => o.draw(col, col2));
  ctx.restore();

  // ── Nave (fora da rotação do túnel) ──
  if (state === 'playing' && !playerDead) drawShip(col, col2, dt);

  // ── Partículas ──
  ctx.save(); particles.forEach(p => p.draw()); ctx.restore();

  // ── Death flash ──
  if (deathFlash > 0) {
    deathFlash -= dt * 3.2;
    ctx.save(); ctx.globalAlpha = Math.max(0, deathFlash) * 0.75;
    ctx.fillStyle = '#ff1122'; ctx.fillRect(0, 0, W, H); ctx.restore();
  }

  // ── Float messages ──
  floatMsgs = floatMsgs.filter(m => m.alpha > 0);
  floatMsgs.forEach(m => {
    m.y += m.vy * dt; m.alpha -= dt * 0.65; m.vy *= 0.96;
    ctx.save();
    ctx.globalAlpha = Math.max(0, Math.min(1, m.alpha));
    ctx.font = `bold ${Math.round(Math.min(W,H)*0.042)}px Courier New`;
    ctx.textAlign = 'center'; ctx.fillStyle = m.col;
    ctx.shadowColor = m.col; ctx.shadowBlur = 18;
    ctx.fillText(m.txt, CX, m.y); ctx.restore();
  });
}

// ── Start / Game Over ─────────────────────────────────────────────
function startGame() {
  if (frameId) cancelAnimationFrame(frameId);
  state = 'playing'; score = 0; totalTime = 0;
  speed = BASE_SPD; phaseIdx = 0; phaseTimer = PHASE_DUR;
  tunnelAngle = 0; tunnelZ = 0;
  playerDead = false; deathFlash = 0; shipTilt = 0;
  obstacles = []; particles = []; floatMsgs = [];
  keyLeft = keyRight = false; touchDX = 0;
  lastTs = 0;
  hideOvs();
  document.getElementById('hud').style.display = 'flex';
  document.getElementById('hudBest').textContent = bestScore > 0 ? 'RECORDE: '+bestScore : '';
  frameId = requestAnimationFrame(loop);
}

function showGameOver() {
  state = 'dead';
  if (score > bestScore) { bestScore = score; localStorage.setItem('trBest', bestScore); }
  document.getElementById('hud').style.display = 'none';
  document.getElementById('goScore').textContent = score;
  document.getElementById('goBest').textContent  = 'Recorde: ' + bestScore;
  showOv('ovGameOver');
  saveScoreCloud();
}

// ── Ranking ───────────────────────────────────────────────────────
async function showRanking() {
  showOv('ovRanking');
  document.getElementById('rankList').innerHTML = '<div class="ov-sub">Carregando...</div>';
  const { data, error } = await supa.from('tr_scores')
    .select('user_id, best_score, profiles(username)')
    .order('best_score', { ascending: false }).limit(15);
  if (error || !data?.length) {
    document.getElementById('rankList').innerHTML = '<div class="ov-sub" style="color:rgba(255,255,255,0.25)">Nenhum score ainda.</div>';
    return;
  }
  let html = '<table class="rank-table">';
  data.forEach((r, i) => {
    const name  = r.profiles?.username || 'Anônimo';
    const isMe  = supaUser && r.user_id === supaUser.id;
    const medal = i===0?'🥇':i===1?'🥈':i===2?'🥉':(i+1)+'°';
    html += `<tr class="${isMe?'rank-me':''}"><td class="rank-pos">${medal}</td><td class="rank-name">${name}${isMe?' 👈':''}</td><td class="rank-sc">${r.best_score}</td></tr>`;
  });
  document.getElementById('rankList').innerHTML = html + '</table>';
}

// ── Auth ──────────────────────────────────────────────────────────
function switchTab(t) {
  const l = t==='login';
  document.getElementById('formLogin').style.display  = l?'flex':'none';
  document.getElementById('formSignup').style.display = l?'none':'flex';
  document.getElementById('tabLogin').style.background  = l?'rgba(255,68,170,0.18)':'transparent';
  document.getElementById('tabSignup').style.background = l?'transparent':'rgba(0,255,136,0.14)';
  document.getElementById('tabLogin').style.color  = l?'#fff':'rgba(255,255,255,0.38)';
  document.getElementById('tabSignup').style.color = l?'rgba(255,255,255,0.38)':'#fff';
  document.getElementById('loginMsg').textContent = document.getElementById('signupMsg').textContent = '';
}
async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass  = document.getElementById('loginPass').value;
  document.getElementById('loginMsg').textContent = 'Entrando...';
  const { data, error } = await supa.auth.signInWithPassword({ email, password: pass });
  if (error) { document.getElementById('loginMsg').textContent = '✗ '+error.message; return; }
  supaUser = data.user; await loadProfile(); updateUserUI(); showOv('ovStart');
}
async function doSignup() {
  const username = document.getElementById('signupUser').value.trim();
  const email    = document.getElementById('signupEmail').value.trim();
  const pass     = document.getElementById('signupPass').value;
  if (!username) { document.getElementById('signupMsg').textContent = '✗ Informe um nome'; return; }
  document.getElementById('signupMsg').textContent = 'Criando...';
  const { data, error } = await supa.auth.signUp({ email, password: pass });
  if (error) { document.getElementById('signupMsg').textContent = '✗ '+error.message; return; }
  supaUser = data.user;
  await supa.from('profiles').upsert({ user_id: supaUser.id, username }, { onConflict:'user_id' });
  supaProfile = { username }; updateUserUI();
  document.getElementById('signupMsg').textContent = '✅ Bem-vindo, '+username+'!';
  setTimeout(() => showOv('ovStart'), 1400);
}
async function doSignOut() {
  await supa.auth.signOut(); supaUser = null; supaProfile = null; updateUserUI(); showOv('ovStart');
}
async function loadProfile() {
  if (!supaUser) return;
  const { data } = await supa.from('profiles').select('username').eq('user_id', supaUser.id).single();
  supaProfile = data || null;
}
function updateUserUI() {
  const ok = !!supaUser && !!supaProfile;
  document.getElementById('userBadge').style.display = ok ? 'block' : 'none';
  if (ok) document.getElementById('badgeUser').textContent = supaProfile.username;
}
async function saveScoreCloud() {
  document.getElementById('goSaveMsg').textContent = '';
  if (!supaUser) return;
  try {
    const { data: ex } = await supa.from('tr_scores').select('best_score').eq('user_id', supaUser.id).single();
    if (score > (ex?.best_score ?? 0)) {
      await supa.from('tr_scores').upsert({ user_id: supaUser.id, best_score: score }, { onConflict:'user_id' });
      document.getElementById('goSaveMsg').textContent = '🏆 Novo recorde salvo!';
    }
  } catch(_) {}
}

// ── Boot ──────────────────────────────────────────────────────────
bestScore = parseInt(localStorage.getItem('trBest') || '0');
if (bestScore > 0) {
  document.getElementById('ovBestRow').style.display = 'block';
  document.getElementById('ovBestTxt').textContent   = '🏆 Recorde: ' + bestScore;
}
(async () => {
  const { data: { session } } = await supa.auth.getSession();
  if (session) { supaUser = session.user; await loadProfile(); updateUserUI(); }
})();

// Loop decorativo na tela inicial
state = 'idle'; phaseIdx = 0; phaseTimer = PHASE_DUR; totalTime = 0;
speed = BASE_SPD; tunnelZ = 0; tunnelAngle = 0;
obstacles = []; particles = []; floatMsgs = [];
// Pré-spawn de alguns obstáculos decorativos
for (let i = 1; i <= 5; i++) obstacles.push(new Obstacle(RING_GAP * i * 5.5 + 300));
lastTs = 0;
frameId = requestAnimationFrame(loop);
</script>
