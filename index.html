<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Tunnel Rush</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #000;
    overflow: hidden;
    font-family: 'Courier New', monospace;
    touch-action: none;
  }
  canvas { display: block; margin: 0 auto; }

  /* ── Overlays ── */
  .overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.82);
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    z-index: 10;
    padding: 20px;
    text-align: center;
  }
  .overlay.show { display: flex; }

  .ov-title {
    font-size: clamp(2rem, 8vw, 3.5rem);
    font-weight: 900;
    letter-spacing: 0.12em;
    text-shadow: 0 0 20px currentColor, 0 0 60px currentColor;
    line-height: 1.1;
  }
  .ov-sub {
    font-size: clamp(0.75rem, 2.5vw, 0.95rem);
    color: rgba(255,255,255,0.55);
    letter-spacing: 0.06em;
    max-width: 360px;
  }
  .ov-score {
    font-size: clamp(1rem, 3.5vw, 1.5rem);
    color: #fff;
    letter-spacing: 0.08em;
  }
  .ov-best {
    font-size: clamp(0.75rem, 2.5vw, 0.9rem);
    color: rgba(255,255,255,0.45);
  }
  .ov-btn {
    margin-top: 6px;
    padding: 12px 36px;
    border: 2px solid currentColor;
    background: transparent;
    color: inherit;
    font-family: 'Courier New', monospace;
    font-size: clamp(0.8rem, 2.5vw, 1rem);
    font-weight: bold;
    letter-spacing: 0.14em;
    cursor: pointer;
    border-radius: 4px;
    transition: background 0.18s;
    text-shadow: 0 0 8px currentColor;
    box-shadow: 0 0 12px currentColor;
  }
  .ov-btn:hover, .ov-btn:active { background: rgba(255,255,255,0.10); }
  .ov-btn-sm {
    padding: 8px 22px;
    font-size: clamp(0.65rem, 2vw, 0.78rem);
    opacity: 0.65;
  }

  /* ── Auth form ── */
  .auth-form {
    display: flex; flex-direction: column; gap: 8px;
    width: 100%; max-width: 280px;
  }
  .auth-form input {
    padding: 10px 14px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 4px;
    color: #fff;
    font-family: 'Courier New', monospace;
    font-size: 0.85rem;
    outline: none;
    width: 100%;
  }
  .auth-form input:focus { border-color: rgba(255,255,255,0.45); }
  .auth-msg { font-size: 0.75rem; min-height: 16px; }

  /* ── Ranking ── */
  .rank-table {
    width: 100%; max-width: 340px;
    border-collapse: collapse;
    font-size: clamp(0.65rem, 2vw, 0.8rem);
  }
  .rank-table td { padding: 5px 8px; }
  .rank-pos { color: rgba(255,255,255,0.4); width: 30px; text-align: center; }
  .rank-name { color: rgba(255,255,255,0.8); }
  .rank-score { color: #fff; font-weight: bold; text-align: right; }
  .rank-me td { color: #fff !important; }

  /* ── HUD in-game ── */
  #hud {
    position: fixed; top: 0; left: 0; right: 0;
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 16px;
    pointer-events: none;
    z-index: 5;
  }
  #hudScore {
    font-size: clamp(1.1rem, 3.5vw, 1.6rem);
    font-weight: bold;
    letter-spacing: 0.08em;
    text-shadow: 0 0 10px currentColor;
  }
  #hudPhase {
    font-size: clamp(0.6rem, 2vw, 0.78rem);
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.12em;
  }
  #hudBest {
    font-size: clamp(0.6rem, 2vw, 0.72rem);
    color: rgba(255,255,255,0.3);
    letter-spacing: 0.06em;
  }
</style>
</head>
<body>

<!-- Ranking -->
<div class="overlay" id="ovRanking">

  <div id="rankingList" style="width:100%;max-width:340px;min-height:80px;display:flex;align-items:center;justify-content:center">
    <div class="ov-sub">Carregando...</div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ═══════════════════════════════════════════════════════
//  TUNNEL RUSH  —  Sci-Fi Neon Tunnel  |  v1.0
// ═══════════════════════════════════════════════════════

const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');

// ── Canvas sizing ────────────────────────────────────
let W, H, CX, CY;
function resizeCanvas() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  CX = W / 2; CY = H / 2;
}
window.addEventListener('resize', () => { resizeCanvas(); });
resizeCanvas();

// ── Fases (tema de cor) ──────────────────────────────
const PHASES = [
  { name: 'NEXUS',    col: '#00ffff', col2: '#0055ff', wall: '#001a33' },
  { name: 'INFERNO',  col: '#ff3300', col2: '#ff9900', wall: '#1a0500' },
  { name: 'ACID',     col: '#aaff00', col2: '#00ff44', wall: '#061a00' },
  { name: 'VORTEX',   col: '#cc00ff', col2: '#ff00aa', wall: '#120020' },
  { name: 'SOLAR',    col: '#ffd700', col2: '#ff6600', wall: '#1a1000' },
  { name: 'FREEZE',   col: '#88eeff', col2: '#aaaaff', wall: '#000d1a' },
];

// ── Estado do jogo ───────────────────────────────────
let state = 'start'; // 'start' | 'playing' | 'dead'
let score = 0, bestScore = 0;
let speed, phaseIdx, phaseTimer, totalTime;
let particles = [];
let obstacles = [];
let tunnelRings = [];
let playerAngle = 0;  // ângulo do jogador dentro do túnel (0-360)
let playerDead = false;
let deathFlash = 0;
let bgStarT = 0;

// ── Constantes ───────────────────────────────────────
const BASE_SPEED   = 320;  // px/s de distância no túnel
const PHASE_DUR    = 30;   // segundos por fase
const RING_GAP     = 90;   // distância entre anéis no espaço 3D
const RING_COUNT   = 18;   // anéis visíveis
const TUNNEL_R     = Math.min(W, H) * 0.42; // raio máximo do túnel
const PLAYER_R_RAT = 0.06; // raio do jogador em relação ao tunnel
const PLAYER_DIST  = 0.72; // distância radial dentro do túnel (0=centro, 1=borda)

// ── Supabase ─────────────────────────────────────────
const SUPA_URL = 'https://tzxdkkoajxwgkphzixyr.supabase.co';
const SUPA_KEY = 'sb_publishable_7T9duH_ZzV7eOywjYPekTg_zLOk9bDx';
const supa = window.supabase.createClient(SUPA_URL, SUPA_KEY);
let supaUser = null, supaProfile = null;

// ── Input ────────────────────────────────────────────
let keyLeft = false, keyRight = false;
let touchDeltaX = 0, touchStartX = 0, touchActive = false;

window.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft'  || e.key === 'a' || e.key === 'A') keyLeft  = true;
  if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keyRight = true;
  if ((e.key === ' ' || e.key === 'Enter') && state !== 'playing') startGame();
});
window.addEventListener('keyup', e => {
  if (e.key === 'ArrowLeft'  || e.key === 'a' || e.key === 'A') keyLeft  = false;
  if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keyRight = false;
});

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (state !== 'playing') { startGame(); return; }
  touchStartX = e.touches[0].clientX;
  touchActive = true;
  touchDeltaX = 0;
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!touchActive) return;
  touchDeltaX = e.touches[0].clientX - touchStartX;
  touchStartX = e.touches[0].clientX;
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  touchActive = false;
  touchDeltaX = 0;
}, { passive: false });

canvas.addEventListener('click', e => {
  if (state !== 'playing') startGame();
});

// ── Overlay helpers ──────────────────────────────────
function showOverlay(id) {
  document.querySelectorAll('.overlay').forEach(o => o.classList.remove('show'));
  document.getElementById(id).classList.add('show');
}
function hideOverlays() {
  document.querySelectorAll('.overlay').forEach(o => o.classList.remove('show'));
}

// ── RNG determinístico (para patterns) ──────────────
function makeRNG(seed) {
  let s = ((seed + 1) * 2654435761) >>> 0;
  return () => { s ^= s<<13; s>>>=0; s ^= s>>17; s>>>=0; s ^= s<<5; s>>>=0; return s/0xFFFFFFFF; };
}

// ── Obstáculos 3D ────────────────────────────────────
// Cada obstáculo tem uma posição Z no túnel infinito.
// Quando Z chega a 0 (na câmera), colidiu.
// Projetamos em perspectiva: escala = fov / z

const FOV  = 350;  // distância focal
const ZNEAR = 60;  // z mínimo (perto da câmera = colisão)
const ZFAR  = RING_COUNT * RING_GAP; // z máximo (desenhado mais longe)

class Obstacle {
  constructor(z) {
    this.z    = z;
    this.type = Math.floor(Math.random() * 4); // 0=barra, 1=cruzeta, 2=espiral, 3=parede_gap
    this.rot  = Math.random() * Math.PI * 2;   // rotação inicial
    this.rotSpd = (Math.random() - 0.5) * 1.8; // velocidade de rotação
    this.gap  = Math.PI * (0.38 + Math.random() * 0.28); // tamanho do gap (tipo 3)
    this.gapAngle = Math.random() * Math.PI * 2;
    this.dead = false;
  }

  update(dt, spd) {
    this.z -= spd * dt;
    this.rot += this.rotSpd * dt;
    if (this.z < -ZNEAR * 2) this.dead = true;
  }

  // Projeta z para escala na tela
  get scale() { return FOV / Math.max(this.z, 1); }
  get screenR() { return Math.min(W, H) * 0.5 * this.scale / (FOV / Math.min(W, H) * 0.5); }

  draw(col, col2) {
    if (this.z <= 0) return;
    const sc = FOV / this.z;
    const r  = Math.min(W, H) * 0.46 * sc; // raio do túnel nessa profundidade
    if (r < 2) return;

    const alpha = Math.min(1, (this.z - ZNEAR) / (ZNEAR * 2));
    if (alpha <= 0) return;

    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(CX, CY);
    ctx.rotate(this.rot);
    ctx.strokeStyle = col;
    ctx.fillStyle   = col;
    ctx.shadowColor = col;
    ctx.shadowBlur  = 18;
    ctx.lineWidth   = Math.max(1.5, 4 * sc);

    switch (this.type) {
      case 0: // Barra horizontal
        ctx.beginPath();
        ctx.moveTo(-r, 0); ctx.lineTo(r, 0);
        ctx.stroke();
        // Espessura visual
        ctx.globalAlpha = alpha * 0.35;
        ctx.fillRect(-r, -ctx.lineWidth * 1.5, r * 2, ctx.lineWidth * 3);
        break;

      case 1: // Cruzeta (+)
        ctx.lineWidth = Math.max(1.5, 3 * sc);
        for (let i = 0; i < 2; i++) {
          ctx.beginPath();
          ctx.moveTo(-r, 0); ctx.lineTo(r, 0);
          ctx.stroke();
          ctx.rotate(Math.PI / 2);
        }
        break;

      case 2: // Espiral / raios
        ctx.lineWidth = Math.max(1.2, 2.5 * sc);
        const nRays = 3;
        for (let i = 0; i < nRays; i++) {
          ctx.rotate(Math.PI * 2 / nRays);
          ctx.beginPath();
          // Raio da borda ao centro
          ctx.moveTo(0, -r * 0.28);
          ctx.lineTo(0, -r);
          ctx.stroke();
          // Arco nas pontas
          ctx.beginPath();
          ctx.arc(0, -r * 0.7, r * 0.22, 0, Math.PI * 1.1);
          ctx.stroke();
        }
        break;

      case 3: // Parede circular com gap
        ctx.lineWidth = Math.max(2, 5 * sc);
        ctx.beginPath();
        const gapStart = this.gapAngle - this.gap / 2;
        const gapEnd   = this.gapAngle + this.gap / 2;
        ctx.arc(0, 0, r * 0.88, gapEnd, gapStart + Math.PI * 2);
        ctx.stroke();
        // Bordas do gap com cor secundária
        ctx.strokeStyle = col2;
        ctx.shadowColor = col2;
        ctx.lineWidth   = Math.max(1.5, 3 * sc);
        [gapStart, gapEnd].forEach(a => {
          const ex = Math.cos(a) * r * 0.88, ey = Math.sin(a) * r * 0.88;
          ctx.beginPath();
          ctx.moveTo(ex * 0.7, ey * 0.7);
          ctx.lineTo(ex, ey);
          ctx.stroke();
        });
        break;
    }

    ctx.restore();
  }

  // Checar colisão com o jogador
  collides(pAngle) {
    if (this.z > ZNEAR * 3 || this.z < 0) return false;
    const proximity = 1 - Math.max(0, (this.z - ZNEAR) / (ZNEAR * 1.5));
    if (proximity < 0.35) return false;

    switch (this.type) {
      case 0: { // Barra horizontal: zona de perigo = 30° em torno de 0° e 180°
        const a = ((pAngle - this.rot) % (Math.PI * 2) + Math.PI * 2) % (Math.PI * 2);
        const safe = Math.PI * 0.18; // 32 graus de cada lado = zona segura (cima/baixo)
        return !((a < safe || a > Math.PI * 2 - safe) || (a > Math.PI - safe && a < Math.PI + safe));
      }
      case 1: { // Cruzeta: 4 braços
        const a = ((pAngle - this.rot) % (Math.PI * 2) + Math.PI * 2) % (Math.PI * 2);
        const safe = Math.PI * 0.20;
        const zones = [0, Math.PI/2, Math.PI, Math.PI*3/2];
        return !zones.some(z => { const d = Math.abs(((a - z + Math.PI) % (Math.PI*2)) - Math.PI); return d < safe; });
      }
      case 2: { // Raios: 3 raios a 120°
        const a = ((pAngle - this.rot) % (Math.PI * 2) + Math.PI * 2) % (Math.PI * 2);
        const safe = Math.PI * 0.22;
        for (let i = 0; i < 3; i++) {
          const z = i * Math.PI * 2 / 3;
          const d = Math.abs(((a - z + Math.PI) % (Math.PI*2)) - Math.PI);
          if (d < safe) return true;
        }
        return false;
      }
      case 3: { // Parede com gap: tudo colide exceto o gap
        const a = ((pAngle - this.rot) % (Math.PI * 2) + Math.PI * 2) % (Math.PI * 2);
        const gapS = ((this.gapAngle - this.gap / 2) % (Math.PI*2) + Math.PI*2) % (Math.PI*2);
        const gapE = ((this.gapAngle + this.gap / 2) % (Math.PI*2) + Math.PI*2) % (Math.PI*2);
        let inGap;
        if (gapS < gapE) inGap = a >= gapS && a <= gapE;
        else             inGap = a >= gapS || a <= gapE;
        return !inGap;
      }
    }
    return false;
  }
}

// ── Partículas ───────────────────────────────────────
class Particle {
  constructor(x, y, col, vx, vy, life, r) {
    this.x = x; this.y = y;
    this.vx = vx; this.vy = vy;
    this.col = col;
    this.life = life; this.maxLife = life;
    this.r = r;
  }
  update(dt) {
    this.x += this.vx * dt;
    this.y += this.vy * dt;
    this.vy += 60 * dt; // gravidade leve
    this.life -= dt;
  }
  draw() {
    const a = Math.max(0, this.life / this.maxLife);
    ctx.save();
    ctx.globalAlpha = a;
    ctx.fillStyle   = this.col;
    ctx.shadowColor = this.col;
    ctx.shadowBlur  = 8;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r * a, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

function spawnExplosion(x, y, col, n = 24) {
  for (let i = 0; i < n; i++) {
    const a  = Math.random() * Math.PI * 2;
    const sp = 80 + Math.random() * 260;
    particles.push(new Particle(x, y, col,
      Math.cos(a) * sp, Math.sin(a) * sp,
      0.5 + Math.random() * 0.8,
      2 + Math.random() * 5
    ));
  }
}

function spawnTrail(x, y, col) {
  particles.push(new Particle(x, y, col,
    (Math.random()-0.5)*30, (Math.random()-0.5)*30,
    0.12 + Math.random() * 0.10,
    1.5 + Math.random() * 2.5
  ));
}

// ── Estrelas de fundo ────────────────────────────────
const STARS = Array.from({length: 80}, () => ({
  x: Math.random(), y: Math.random(),
  r: 0.5 + Math.random() * 1.5,
  speed: 0.15 + Math.random() * 0.6,
}));

function drawStars(dt, col) {
  bgStarT += dt;
  ctx.save();
  STARS.forEach(s => {
    s.x -= s.speed * dt * 0.04;
    if (s.x < 0) { s.x = 1; s.y = Math.random(); }
    const alpha = 0.15 + 0.1 * Math.sin(bgStarT * s.speed * 2 + s.y * 10);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = col;
    ctx.shadowColor = col; ctx.shadowBlur = 4;
    ctx.beginPath();
    ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.restore();
}

// ── Desenho do túnel (anéis) ─────────────────────────
let tunnelOffset = 0; // offset crescente (scroll no eixo Z)

function drawTunnel(col, wallCol) {
  // Desenha anéis do mais longe ao mais perto
  for (let i = RING_COUNT; i >= 0; i--) {
    const z = i * RING_GAP - (tunnelOffset % RING_GAP);
    if (z <= 0) continue;
    const sc = FOV / z;
    const r  = Math.min(W, H) * 0.46 * sc;
    if (r < 2 || r > Math.max(W, H) * 2) continue;

    const alpha = Math.min(0.7, (z / ZFAR) * 1.4) * 0.55;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.strokeStyle = col;
    ctx.shadowColor = col;
    ctx.shadowBlur  = 6;
    ctx.lineWidth   = Math.max(0.5, 1.5 * sc);
    ctx.beginPath();
    ctx.arc(CX, CY, r, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();

    // Linhas longitudinais (eixos do túnel)
    if (i % 2 === 0) {
      const nLines = 6;
      ctx.save();
      ctx.globalAlpha = alpha * 0.45;
      ctx.strokeStyle = col;
      ctx.lineWidth   = 0.5;
      for (let j = 0; j < nLines; j++) {
        const a  = j * Math.PI * 2 / nLines;
        const nx = CX + Math.cos(a) * r;
        const ny = CY + Math.sin(a) * r;
        // Conecta ao próximo anel (perspectiva)
        const z2 = (i - 1) * RING_GAP - (tunnelOffset % RING_GAP);
        if (z2 <= 0) continue;
        const sc2 = FOV / z2;
        const r2  = Math.min(W, H) * 0.46 * sc2;
        const nx2 = CX + Math.cos(a) * r2;
        const ny2 = CY + Math.sin(a) * r2;
        ctx.beginPath();
        ctx.moveTo(nx, ny);
        ctx.lineTo(nx2, ny2);
        ctx.stroke();
      }
      ctx.restore();
    }
  }
}

// ── Jogador (bola neon na borda do túnel) ────────────
function drawPlayer(col, col2) {
  const r  = Math.min(W, H) * 0.44; // raio da trilha do jogador
  const px = CX + Math.cos(playerAngle) * r * PLAYER_DIST;
  const py = CY + Math.sin(playerAngle) * r * PLAYER_DIST;
  const pr = Math.min(W, H) * PLAYER_R_RAT;

  // Rastro de velocidade
  if (state === 'playing' && !playerDead) {
    spawnTrail(px, py, col);
  }

  ctx.save();
  // Glow externo
  ctx.shadowColor = col; ctx.shadowBlur = 28;
  ctx.globalAlpha = 0.6;
  ctx.fillStyle = col2;
  ctx.beginPath();
  ctx.arc(px, py, pr * 1.6, 0, Math.PI * 2);
  ctx.fill();
  // Núcleo
  ctx.shadowBlur = 14;
  ctx.globalAlpha = 1;
  const g = ctx.createRadialGradient(px - pr*0.3, py - pr*0.3, 0, px, py, pr);
  g.addColorStop(0, '#ffffff');
  g.addColorStop(0.4, col);
  g.addColorStop(1, col2);
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.arc(px, py, pr, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  return { x: px, y: py, r: pr };
}

// ── Loop de jogo ─────────────────────────────────────
let lastTs = 0;
let frameId = null;

function loop(ts) {
  frameId = requestAnimationFrame(loop);
  const dt = Math.min((ts - lastTs) / 1000, 0.05);
  lastTs = ts;

  const ph = PHASES[phaseIdx % PHASES.length];
  const col  = ph.col;
  const col2 = ph.col2;

  // ── Background ──
  ctx.fillStyle = '#000010';
  ctx.fillRect(0, 0, W, H);

  // Gradiente radial de fundo (cor da fase)
  const bg = ctx.createRadialGradient(CX, CY, 0, CX, CY, Math.min(W,H)*0.55);
  bg.addColorStop(0, ph.wall + 'ff');
  bg.addColorStop(1, '#000008ff');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  drawStars(dt, col);

  if (state === 'playing' && !playerDead) {
    // ── Atualizar estado ──
    totalTime  += dt;
    score       = Math.floor(totalTime * 12 + speed * 0.05);
    phaseTimer -= dt;
    speed       = BASE_SPEED + totalTime * 28;

    if (phaseTimer <= 0) {
      phaseTimer = PHASE_DUR;
      phaseIdx++;
      // Float text de fase
      floatPhaseMsg = `FASE ${phaseIdx + 1} — ${PHASES[phaseIdx % PHASES.length].name}`;
      floatPhaseTtl = 2.5;
    }

    // Scroll do túnel
    tunnelOffset += speed * dt;

    // Mover jogador
    const rotSpd = 2.2 + speed * 0.001; // velocidade de rotação
    if (keyLeft)           playerAngle -= rotSpd * dt;
    if (keyRight)          playerAngle += rotSpd * dt;
    if (touchDeltaX !== 0) playerAngle += touchDeltaX * 0.012;

    // Spawnar obstáculos
    while (obstacles.length === 0 || obstacles[obstacles.length-1].z < ZFAR - RING_GAP * 3) {
      const lastZ = obstacles.length ? obstacles[obstacles.length-1].z : ZFAR;
      const gap   = RING_GAP * (2.5 + Math.random() * 2.5);
      obstacles.push(new Obstacle(lastZ + gap));
    }

    // Atualizar obstáculos
    obstacles.forEach(o => o.update(dt, speed));
    obstacles = obstacles.filter(o => !o.dead);

    // Colisão
    const playerPos = playerAngle;
    for (const obs of obstacles) {
      if (obs.collides(playerPos)) {
        playerDead = true;
        deathFlash = 1.0;
        const pr = Math.min(W, H) * 0.44;
        const px = CX + Math.cos(playerAngle) * pr * PLAYER_DIST;
        const py = CY + Math.sin(playerAngle) * pr * PLAYER_DIST;
        spawnExplosion(px, py, col, 30);
        spawnExplosion(CX, CY, col2, 16);
        setTimeout(() => showGameOver(), 900);
        break;
      }
    }

    // Partículas
    particles.forEach(p => p.update(dt));
    particles = particles.filter(p => p.life > 0);

    // HUD
    document.getElementById('hudScore').textContent = score;
    document.getElementById('hudScore').style.color  = col;
    document.getElementById('hudPhase').textContent  = `FASE ${phaseIdx + 1} — ${ph.name}`;
  } else if (state === 'dead') {
    // Só anima partículas
    particles.forEach(p => p.update(dt));
    particles = particles.filter(p => p.life > 0);
    tunnelOffset += 40 * dt; // tunel continua devagar
  }

  // ── Desenhar ──
  drawTunnel(col, ph.wall);

  // Obstáculos
  obstacles.forEach(o => o.draw(col, col2));

  // Player
  if (!playerDead || deathFlash > 0) drawPlayer(col, col2);

  // Partículas por cima
  particles.forEach(p => p.draw());

  // Death flash
  if (deathFlash > 0) {
    deathFlash -= dt * 3;
    ctx.save();
    ctx.globalAlpha = Math.max(0, deathFlash) * 0.7;
    ctx.fillStyle = '#ff0033';
    ctx.fillRect(0, 0, W, H);
    ctx.restore();
  }

  // Float de fase
  if (typeof floatPhaseTtl === 'number' && floatPhaseTtl > 0) {
    floatPhaseTtl -= dt;
    const a = Math.min(1, floatPhaseTtl) * Math.min(1, floatPhaseTtl * 2);
    ctx.save();
    ctx.globalAlpha = a;
    ctx.font = `bold ${Math.round(Math.min(W,H)*0.045)}px Courier New`;
    ctx.textAlign = 'center';
    ctx.fillStyle = PHASES[phaseIdx % PHASES.length].col;
    ctx.shadowColor = PHASES[phaseIdx % PHASES.length].col;
    ctx.shadowBlur = 20;
    ctx.fillText(floatPhaseMsg || '', CX, CY * 0.35);
    ctx.restore();
  }
}

let floatPhaseMsg = '', floatPhaseTtl = 0;

// ── Início de jogo ───────────────────────────────────
function startGame() {
  if (frameId) { cancelAnimationFrame(frameId); frameId = null; }
  state       = 'playing';
  score       = 0;
  totalTime   = 0;
  speed       = BASE_SPEED;
  phaseIdx    = 0;
  phaseTimer  = PHASE_DUR;
  tunnelOffset = 0;
  playerAngle  = 0;
  playerDead   = false;
  deathFlash   = 0;
  obstacles    = [];
  particles    = [];
  floatPhaseTtl = 0;
  keyLeft = keyRight = false;
  touchDeltaX = 0;
  lastTs = 0;

  hideOverlays();
  document.getElementById('hud').style.display = 'flex';
  document.getElementById('hudBest').textContent = bestScore > 0 ? 'RECORDE: ' + bestScore : '';

  frameId = requestAnimationFrame(loop);
}

// ── Game Over ────────────────────────────────────────
function showGameOver() {
  state = 'dead';
  if (score > bestScore) {
    bestScore = score;
    localStorage.setItem('tunnelRushBest', bestScore);
  }
  document.getElementById('hud').style.display = 'none';
  document.getElementById('goScore').textContent = score;
  document.getElementById('goBest').textContent  = 'Recorde: ' + bestScore;
  showOverlay('ovGameOver');
  saveScoreCloud();
}

// ── Ranking ──────────────────────────────────────────
async function showRanking() {
  showOverlay('ovRanking');
  document.getElementById('rankingList').innerHTML = '<div class="ov-sub">Carregando...</div>';
  const { data, error } = await supa
    .from('tr_scores')
    .select('best_score, profiles(username)')
    .order('best_score', { ascending: false })
    .limit(15);

  if (error || !data || data.length === 0) {
    document.getElementById('rankingList').innerHTML = '<div class="ov-sub" style="color:rgba(255,255,255,0.3)">Nenhum score ainda.</div>';
    return;
  }

  const myId = supaUser?.id;
  let html = '<table class="rank-table">';
  data.forEach((row, i) => {
    const name  = row.profiles?.username || 'Anônimo';
    const isMe  = supaUser && row.user_id === myId;
    const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : (i+1) + '°';
    html += `<tr class="${isMe ? 'rank-me' : ''}">
      <td class="rank-pos">${medal}</td>
      <td class="rank-name">${name}${isMe ? ' 👈' : ''}</td>
      <td class="rank-score">${row.best_score}</td>
    </tr>`;
  });
  html += '</table>';
  document.getElementById('rankingList').innerHTML = html;
}

// ── Auth ─────────────────────────────────────────────
function switchTab(tab) {
  const isLogin = tab === 'login';
  document.getElementById('formLogin').style.display  = isLogin ? 'flex' : 'none';
  document.getElementById('formSignup').style.display = isLogin ? 'none'  : 'flex';
  document.getElementById('tabLogin').style.background  = isLogin ? 'rgba(255,68,170,0.18)' : 'transparent';
  document.getElementById('tabSignup').style.background = isLogin ? 'transparent' : 'rgba(0,255,136,0.14)';
  document.getElementById('tabLogin').style.color  = isLogin ? '#fff' : 'rgba(255,255,255,0.4)';
  document.getElementById('tabSignup').style.color = isLogin ? 'rgba(255,255,255,0.4)' : '#fff';
  document.getElementById('loginMsg').textContent  = '';
  document.getElementById('signupMsg').textContent = '';
}

async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass  = document.getElementById('loginPass').value;
  document.getElementById('loginMsg').textContent = 'Entrando...';
  const { data, error } = await supa.auth.signInWithPassword({ email, password: pass });
  if (error) { document.getElementById('loginMsg').textContent = '✗ ' + error.message; return; }
  supaUser = data.user;
  await loadProfile();
  updateUserUI();
  showOverlay('ovStart');
}

async function doSignup() {
  const username = document.getElementById('signupUser').value.trim();
  const email    = document.getElementById('signupEmail').value.trim();
  const pass     = document.getElementById('signupPass').value;
  if (!username) { document.getElementById('signupMsg').textContent = '✗ Informe um nome de usuário'; return; }
  document.getElementById('signupMsg').textContent = 'Criando conta...';
  const { data, error } = await supa.auth.signUp({ email, password: pass });
  if (error) { document.getElementById('signupMsg').textContent = '✗ ' + error.message; return; }
  supaUser = data.user;
  // Salvar perfil
  await supa.from('profiles').upsert({ user_id: supaUser.id, username }, { onConflict: 'user_id' });
  supaProfile = { username };
  updateUserUI();
  document.getElementById('signupMsg').textContent = '✅ Conta criada! Bem-vindo, ' + username;
  setTimeout(() => showOverlay('ovStart'), 1500);
}

async function doSignOut() {
  await supa.auth.signOut();
  supaUser = null; supaProfile = null;
  updateUserUI();
  showOverlay('ovStart');
}

async function loadProfile() {
  if (!supaUser) return;
  const { data } = await supa.from('profiles').select('username').eq('user_id', supaUser.id).single();
  supaProfile = data || null;
}

function updateUserUI() {
  const logado = !!supaUser && !!supaProfile;
  const badge  = document.getElementById('userBadge');
  const authBtn = document.querySelector('#ovStart .ov-btn-sm[onclick="showOverlay(\'ovAuth\')"]');
  if (logado) {
    badge.style.display = 'flex';
    document.getElementById('badgeUser').textContent = supaProfile.username;
    if (authBtn) authBtn.style.display = 'none';
  } else {
    badge.style.display = 'none';
    if (authBtn) authBtn.style.display = '';
  }
}

// ── Salvar score na nuvem ────────────────────────────
async function saveScoreCloud() {
  document.getElementById('goSaveMsg').textContent = '';
  if (!supaUser) return;
  try {
    const { data: existing } = await supa.from('tr_scores').select('best_score').eq('user_id', supaUser.id).single();
    const prev = existing?.best_score ?? 0;
    if (score > prev) {
      await supa.from('tr_scores').upsert({ user_id: supaUser.id, best_score: score }, { onConflict: 'user_id' });
      document.getElementById('goSaveMsg').textContent = '🏆 Novo recorde salvo na nuvem!';
    }
  } catch (_) {}
}

// ── Boot ─────────────────────────────────────────────
bestScore = parseInt(localStorage.getItem('tunnelRushBest') || '0');
if (bestScore > 0) {
  document.getElementById('ovStartBestRow').style.display = 'block';
  document.getElementById('ovStartBest').textContent = '🏆 Recorde: ' + bestScore;
}

// Auto-login
(async () => {
  const { data: { session } } = await supa.auth.getSession();
  if (session) {
    supaUser = session.user;
    await loadProfile();
    updateUserUI();
  }
})();

// Iniciar loop de fundo (tela de start)
state = 'start';
phaseIdx = 0; phaseTimer = PHASE_DUR; totalTime = 0; speed = BASE_SPEED;
tunnelOffset = 0; playerAngle = 0; playerDead = false;
obstacles = []; particles = [];
lastTs = 0;
frameId = requestAnimationFrame(loop);
</script>
</body>
</html>
